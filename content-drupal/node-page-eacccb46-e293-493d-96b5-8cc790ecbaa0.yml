      value: '<p>Market launch:</p><h2>Futuristic advertising idea</h2><ul><li>&nbsp;&nbsp;&nbsp; Supermarkets - stand out among thousands of products</li><li>Window dressing - so stand out !</li><li>Trade fair stand - visible from 20m even in strongly lit halls</li><li>Events, functions - mesmerising</li><li>Coffee shops, restaurants</li><li>Jewellery shop, luxury watches</li></ul><p>&nbsp;</p><p>&nbsp;</p><h4>Hologram Human in 3D</h4><!--Grid row--><p>&nbsp;</p><div class="row d-flex justify-content-center"><!--Grid column--><div class="col-md-6"><h4 class="h5 mb-4"><mark><strong>Only our fan display has high brightness and real HD quality !</strong></mark></h4><div class="embed-responsive embed-responsive-16by9 hoverable"><iframe allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" frameborder="0" height="315" src="https://www.youtube.com/embed/hXN4wzhby3w" title="YouTube video player" width="560"></iframe></div></div><!--Grid column--></div><!--Grid row--><p>Ask for &nbsp;more videos <a href="/contact">here</a></p><p>&nbsp;</p><p><strong>We sell this product currently.</strong></p><p>Please visit our &nbsp;<a href="http://hologra3.com/" target="_blank">Hologra3.com</a> &nbsp;to contact us for price and inquiry.</p><p>&nbsp;</p><p>&nbsp;</p><p><em>A new product that will encourage every passer-by to stop in front of your shop window.</em></p><p>&nbsp;</p><p>What exactly do we offer?<br>We offer a device that will dwarf the monitors and TVs that will play out advertising in the shop window. Literally. Why?<br>Our device produces a hologram effect with LEDs mounted on propellers. This allows you to broadcast your advertising message to passers-by with a 3D effect and guarantee that you will get all attention.<br>We don''t just project a still image, no. We can also play a video with sound!</p><p>&nbsp;</p><p>&nbsp;</p><hr><p>&nbsp;</p><p>Our previous customers have praised us for the following advantages:<br>Your benefits</p><ul><li>* We use <mark>cloud-based technology</mark> so you can control the device from anywhere through an app with the smartphone of your choice. Also from home!</li><li>You can play your <mark>own MP4 videos</mark>.&nbsp;&nbsp; If necessary, we support them in the creation. By default, approximately 100 videos are pre-installed on the device for each industry</li><li><mark>Highest luminosity</mark> of the LEDs makes it possible to experience the advertising message in full colour intensity at any time of the day.&nbsp; The<mark> resolution is crisp 2x HD</mark> and thus a clearer image is possible than with conventional monitors or TVs.</li><li>The power consumption is <mark>70 watts or 140 watts</mark> (depending on the variant) so that you save significantly compared to monitors or huge TVs significantly.</li><li>With a total weight of <mark>0.8kg to a maximum of 2kg</mark> and&nbsp;&nbsp; the&nbsp; supplied tripod,you can easily place it anywhere you want.</li><li>The propellers rotate so fast that they disappear for the visible eye. Thus, the advertising message for the viewer hovers. Pioneering technology!</li><li>Permanent and silent marketing. The brushless rotor enables continuous operation of <mark>24 hours at&nbsp; 50dB volume</mark>.&nbsp; Basically, you only hear a radio rushing!</li><li>Instead of buying the device you can also <mark>rent from us</mark>. Thus, the fixed costs remain small and clear.</li><li>We strive for a long-term customer&nbsp; relationship. That''s why we offer you lifelong support and if you need us, we will also do the service at your site..</li></ul><p>&nbsp;</p><p>&nbsp;</p>'
