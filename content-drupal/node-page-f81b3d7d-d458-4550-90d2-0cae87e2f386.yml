      value: "<div class=\"container py-5\"><section class=\"mb-5\"><div class=\"row align-items-stretch g-4\"><!-- LEFT TEXT --><div class=\"col-lg-6\"><div class=\"p-4 p-lg-5 border rounded-4 shadow-sm h-100\"><h2 class=\"fw-bold mb-3\">Your AWS Bedrock &amp; Artificial Intelligence Agency</h2><p class=\"lead text-muted mb-4\">I help companies build clean, scalable backend systems using AWS, TypeScript, NestJS, Node.js, and modern DevOps infrastructure.</p><p class=\"mb-4\">Whether it's an MVP, SaaS platform, internal tools, or AI integration — I develop systems that are stable, maintainable, and grow with your product.</p><div class=\"d-flex flex-wrap gap-2 mb-4\"><span class=\"badge text-bg-dark px-3 py-2\">AWS Lambda</span> <span class=\"badge text-bg-dark px-3 py-2\">TypeScript</span> <span class=\"badge text-bg-dark px-3 py-2\">NestJS</span> <span class=\"badge text-bg-dark px-3 py-2\">Node.js</span> <span class=\"badge text-bg-dark px-3 py-2\">DevOps</span> <span class=\"badge text-bg-dark px-3 py-2\">LangChain</span> <span class=\"badge text-bg-dark px-3 py-2\">AI Integrations</span></div><div class=\"d-flex flex-column flex-sm-row gap-3\"><a class=\"btn btn-primary btn-lg\" href=\"/contact\" target=\"_blank\">Contact Me</a> <a class=\"btn btn-outline-primary btn-lg\" href=\"#services\">View Services</a></div></div></div><!-- STATS --><div class=\"col-lg-3\"><div class=\"p-4 border rounded-4 shadow-sm h-100\"><h5 class=\"mb-4\">Why Clients Hire Me</h5><div class=\"row g-3 text-center\"><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><strong>100%</strong><br><small>Job Success</small></div></div><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><strong>Top Rated</strong><br><small>Upwork</small></div></div><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><strong>31</strong><br><small>Projects</small></div></div><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><strong>1,464</strong><br><small>Hours</small></div></div><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><strong>7 years</strong><br><small>Since 2019</small></div></div></div></div></div><!-- PROFILE --><div class=\"col-lg-3\"><div class=\"p-4 border rounded-4 shadow-sm h-100 text-center\"><img class=\"img-fluid rounded-circle mb-3\" style=\"max-width:150px;\" src=\"/p/hamza.png\" alt=\"Hamza AWS Serverless Engineer\" width=\"1254\" height=\"1254\"><h6 class=\"mb-1\">Hamza</h6><p><small class=\"text-muted d-block mb-3\">AWS Serverless Engineer</small></p><div class=\"row g-2 text-center\"><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><strong>100%</strong><br><small>Success</small></div></div><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><strong>Top</strong><br><small>Rated</small></div></div></div><p>We reply today ! Email to&nbsp;<script>\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              document.write(\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                '<a href=\"mailto:' + 'contact' + '@' + 'salespeare.com' + '\">contact@salespeare.com</a>'\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              );\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </script></p></div></div></div></section></div><hr><!-- VIDEO --><div class=\"col-12 d-flex justify-content-center\"><div class=\"col-md-6\"><div class=\"card h-100 shadow rounded-4 overflow-hidden\"><div class=\"ratio ratio-16x9\"><iframe class=\"rounded-top-4 border-0 w-100 h-100\" src=\"https://www.youtube.com/embed/_uJtqSRaWH8\" title=\"YouTube video player\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" allowfullscreen=\"\">\r\n                                                </iframe></div><div class=\"card-body text-center\"><h5>Superior Electrostatic Performance</h5><p class=\"text-muted\">Coats complex parts and Faraday cage areas effortlessly.</p></div></div></div></div><hr><p>&nbsp;</p><p>&nbsp;</p><p>&nbsp;</p><div class=\"d-none\"><meta name=\"description\" content=\"AWS Serverless Engineer based in Dubai specializing in TypeScript backends, NestJS APIs, DevOps, Kubernetes, and AI integrations. Scalable systems, clear communication, and clean architecture for SaaS, MVPs, and modern products.\"></div><section class=\"mb-5\"><div class=\"row g-4\"><div class=\"col-md-4\"><div class=\"p-4 border rounded-4 shadow-sm h-100\"><h3 class=\"h5 mb-3\">Clean Architecture Over Quick Fixes</h3><p class=\"mb-0 text-muted\">I build backend systems and infrastructure that won’t become bottlenecks later — saving time, reducing errors, and avoiding costly rewrites.</p></div></div><div class=\"col-md-4\"><div class=\"p-4 border rounded-4 shadow-sm h-100\"><h3 class=\"h5 mb-3\">Fast Communication &amp; Clear Execution</h3><p class=\"mb-0 text-muted\">Clients value fast responses, transparent communication, and implementation that actually moves the product forward.</p></div></div><div class=\"col-md-4\"><div class=\"p-4 border rounded-4 shadow-sm h-100\"><h3 class=\"h5 mb-3\">Technology That Fits Your Product</h3><p class=\"mb-0 text-muted\">No unnecessary overengineering. I build solutions tailored to your team, your product, and your growth stage.</p></div></div></div></section><section class=\"mb-5\" id=\"services\"><div class=\"text-center mb-4\"><h3 class=\"fw-bold\">Services</h3><p class=\"text-muted mb-0\">Technical support for products that need to run reliably and scale cleanly.</p></div><div class=\"row g-4\"><div class=\"col-md-6 col-xl-4\"><div class=\"card h-100 border-0 shadow rounded-4\"><div class=\"card-body p-4\"><h4 class=\"h5 mb-3\">AWS Serverless Development</h4><p class=\"text-muted mb-0\">Build and optimize serverless systems using Lambda, API Gateway, S3, DynamoDB, SQS, SNS, SES, EventBridge, OpenSearch, and CloudWatch.</p></div></div></div><div class=\"col-md-6 col-xl-4\"><div class=\"card h-100 border-0 shadow rounded-4\"><div class=\"card-body p-4\"><h4 class=\"h5 mb-3\">TypeScript &amp; NestJS Backends</h4><p class=\"text-muted mb-0\">APIs, business logic, auth flows, and backend architecture built for long-term maintainability and scalability.</p></div></div></div><div class=\"col-md-6 col-xl-4\"><div class=\"card h-100 border-0 shadow rounded-4\"><div class=\"card-body p-4\"><h4 class=\"h5 mb-3\">Node.js Product Development</h4><p class=\"text-muted mb-0\">Reliable backend logic for SaaS products, internal platforms, and custom web applications.</p></div></div></div><div class=\"col-md-6 col-xl-4\"><div class=\"card h-100 border-0 shadow rounded-4\"><div class=\"card-body p-4\"><h4 class=\"h5 mb-3\">MVP Backend Foundation</h4><p class=\"text-muted mb-0\">Fast startup with a clean technical foundation so future scaling won’t become a problem.</p></div></div></div><div class=\"col-md-6 col-xl-4\"><div class=\"card h-100 border-0 shadow rounded-4\"><div class=\"card-body p-4\"><h4 class=\"h5 mb-3\">DevOps &amp; Kubernetes on AWS</h4><p class=\"text-muted mb-0\">Improve deployments, containerization, monitoring, and infrastructure for smoother delivery processes.</p></div></div></div><div class=\"col-md-6 col-xl-4\"><div class=\"card h-100 border-0 shadow rounded-4\"><div class=\"card-body p-4\"><h4 class=\"h5 mb-3\">AI Chatbots &amp; Integrations</h4><p class=\"text-muted mb-0\">Integrate OpenAI, Claude, LangChain, or FastAPI into existing backends to add AI capabilities cleanly.</p></div></div></div></div></section>"
