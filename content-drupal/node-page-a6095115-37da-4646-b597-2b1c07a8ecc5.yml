      value: '<section class="py-5" style="background-color:#f0fdf4;"><div class="container"><div class="col-xl-10 mx-auto"><!-- HERO --><div class="p-5 mb-5 rounded-4 shadow-lg"><h2 class="fw-bold text-dark">Powder Coating Batch Ovens – Industrial Curing Systems</h2><p class="lead text-dark">Gas, electric, diesel or infrared ovens for perfect curing results.</p><p><a class="btn btn-success rounded-pill px-4" href="/contact">Get Quote</a></p></div><meta name="description" content="Discover industrial powder coating batch ovens with gas, electric, diesel or infrared heating. Fast delivery, custom sizes, efficient curing, and turnkey support for manufacturers worldwide."><!-- INTRO --><div class="card p-4 mb-5 shadow-lg border-0 rounded-4"><h3 class="fw-bold">Overview</h3><p>Curing ovens heat coated parts typically between 160–180°C for 10–20 minutes depending on powder type.</p><ul><li>Electric / Gas / Oil / Infrared</li><li>1–7 meter standard sizes</li><li>Custom industrial sizes available</li></ul></div><!-- IMAGE --><img class="img-fluid rounded-4 mb-5" src="/p13/16.webp" alt="industrial powder coating oven tunnel system" width="720" height="404"><!-- BENEFITS --><div class="row g-4 mb-5"><div class="col-md-6"><div class="card p-4 shadow-lg border-0 rounded-4"><h3 class="text-success fw-bold">Advantages</h3><ul><li>✔ Uniform curing</li><li>✔ Durable coating</li><li>✔ Efficient insulation</li><li>✔ Fast heating cycles</li></ul></div></div><div class="col-md-6"><div class="card p-4 shadow-lg border-0 rounded-4"><h3 class="text-danger fw-bold">Typical Problems</h3><ul><li>✖ Uneven heat</li><li>✖ High energy cost</li><li>✖ Poor airflow</li></ul></div></div></div><!-- TYPES --><div class="card p-4 mb-5 shadow-lg border-0 rounded-4"><h3 class="fw-bold">Heating Types</h3><ul><li>Electric ovens</li><li>Gas / oil burners</li><li>Infrared curing</li><li>Hybrid systems</li></ul></div><!-- DIMENSIONS --><div class="card p-4 mb-5 shadow-lg border-0 rounded-4"><h3 class="fw-bold">Standard Dimensions</h3><table class="table table-bordered"><thead><tr><th>Type</th><th>Width</th><th>Height</th><th>Length</th></tr></thead><tbody><tr><td>EL20</td><td>1.5m</td><td>1.8m</td><td>2m</td></tr><tr><td>EL30</td><td>1.5m</td><td>1.8m</td><td>3m</td></tr><tr><td>EL40</td><td>1.5m</td><td>1.8m</td><td>4m</td></tr><tr><td>EL50</td><td>1.5m</td><td>1.8m</td><td>5m</td></tr><tr><td>EL70</td><td>1.5m</td><td>1.8m</td><td>7m</td></tr></tbody></table></div><!-- TECH --><div class="card p-4 mb-5 shadow-lg border-0 rounded-4"><h3 class="fw-bold">Technical Features</h3><ul><li>Air convection system with fans</li><li>Multiple sensors for temperature control</li><li>High insulation efficiency</li><li>Gas or electric heating options</li></ul></div><!-- CONTROL --><div class="row g-4 mb-5"><div class="col-md-6"><img class="img-fluid rounded-4" src="/p13/analog.webp" alt="powder coating oven analog control system" width="463" height="720"><p>Analog control system – reliable and simple</p></div><div class="col-md-6"><img class="img-fluid rounded-4" src="/p13/siemens steuerung.webp" alt="powder coating oven digital PLC control Siemens"><p>Digital PLC control up to 450°C</p></div></div><!-- VARIANTS --><div class="row g-4 mb-5"><div class="col-md-3"><img class="img-fluid" src="/p13/1.webp" alt="small powder coating oven compact" width="720" height="540"></div><div class="col-md-3"><img class="img-fluid" src="/p13/2.webp" alt="powder oven wheel coating" width="582" height="439"></div><div class="col-md-3"><img class="img-fluid" src="/p13/3.webp" alt="7 meter powder coating oven" width="720" height="540"></div><div class="col-md-3"><img class="img-fluid" src="/p13/4.webp" alt="powder oven combustion chamber" width="720" height="540"></div></div><!-- CTA --><div class="text-center"><div class="p-5 rounded-4 shadow-lg bg-primary text-white"><h2 class="fw-bold">Request Your Custom Oven</h2><p>Fast delivery – best price – global installation</p><p><a class="btn btn-light btn-lg rounded-pill px-5" href="/contact">Get Offer</a></p></div></div></div></div></section>'
