      value: "<hr><div class=\"container py-5\"><div class=\"row\"><!-- Left: Image and Thumbnails --><div class=\"col-md-5 mb-4\"><!-- Main Image --><div class=\"mb-3\"><img class=\"img-fluid rounded w-100\" src=\"/p0/4.webp\" alt=\"Hauptbild\" width=\"800\" height=\"533\" id=\"mainImage\"></div><!-- Thumbnails --><div class=\"d-flex gap-2\"><img class=\"thumb-img rounded active\" src=\"/u1/fiber-laser-cutting-machine.jpg\" alt=\"Thumb 1\" width=\"100\" height=\"69\" onclick=\"changeImage(this)\"> <img class=\"thumb-img rounded\" src=\"/u1/fiber-laser-cutting-kW.jpg\" alt=\"Thumb 2\" width=\"100\" height=\"58\" onclick=\"changeImage(this)\"> <img class=\"thumb-img rounded\" src=\"/u1/fiber-laser-cutting.jpg\" alt=\"Thumb 3\" width=\"100\" height=\"67\" onclick=\"changeImage(this)\"></div></div><!-- Right: Details --><div class=\"col-md-7\"><h1 class=\"h3\">Gebraucht: Tafelschere RAS 83‑25</h1><div class=\"d-flex align-items-center my-3\"><span class=\"badge bg-success fs-5 me-3\">€ 8.200 (exkl. USt.)</span> <small class=\"text-muted\">Standort: Gütersloh, Deutschland</small></div><div class=\"mb-4\"><a class=\"btn btn-primary me-2\" href=\"mailto:info@meinolf-venker.de\">Per E‑Mail anfragen</a> <a class=\"btn btn-outline-secondary\" href=\"tel:+495241221050\">Anrufen</a> <button class=\"btn btn-outline-primary\" onclick=\"window.print()\">\r\n                                  <i class=\"bi bi-printer\"></i> Seite drucken\r\n                                </button></div><h2 class=\"h5\">Beschreibung</h2><p>Max. Schnittlänge: 825 mm<br>Max. Blechstärke: 3 mm&nbsp;Stahl<br>Hydraulischer Antrieb, sehr gepflegter Zustand, revisionsgeprüft. Ideal für präzises Schneiden von Blechen.</p><h2 class=\"h5\">Spezifikationen</h2><table class=\"table table-striped\"><tbody><tr><th>Hersteller</th><td>RAS</td></tr><tr><th>Modell</th><td>83‑25</td></tr><tr><th>Jahr</th><td>1990</td></tr><tr><th>Zustand</th><td>Gebraucht</td></tr><tr><th>Max. Schnittlänge</th><td>825 mm</td></tr><tr><th>Max. Blechstärke</th><td>3 mm (Stahl)</td></tr><tr><th>Gewicht ca.</th><td>1.200 kg</td></tr></tbody></table></div></div></div><hr><div class=\"container py-5\"><div class=\"row\"><!-- Left: Image and Thumbnails --><div class=\"col-md-5 mb-4\"><!-- Main Image --><div class=\"mb-3\"><img class=\"img-fluid rounded w-100\" src=\"/p0/4.webp\" alt=\"Hauptbild\" width=\"800\" height=\"533\" id=\"mainImage2\"></div><!-- Thumbnails --><div class=\"d-flex gap-2\"><img class=\"thumb-img rounded active\" src=\"/u1/fiber-laser-cutting-machine.jpg\" alt=\"Thumb 1\" width=\"100\" height=\"69\" onclick=\"changeImage(this, &apos;mainImage2&apos;)\"> <img class=\"thumb-img rounded\" src=\"/u1/fiber-laser-cutting-kW.jpg\" alt=\"Thumb 2\" width=\"100\" height=\"58\" onclick=\"changeImage (this, &apos;mainImage2&apos;)\"> <img class=\"thumb-img rounded\" src=\"/u1/fiber-laser-cutting.jpg\" alt=\"Thumb 3\" width=\"100\" height=\"67\" onclick=\"changeImage (this, &apos;mainImage2&apos;)\"></div></div><!-- Right: Details --><div class=\"col-md-7\"><h1 class=\"h3\">Gebraucht: Tafelschere RAS 83‑25</h1><div class=\"d-flex align-items-center my-3\"><span class=\"badge bg-success fs-5 me-3\">€ 8.200 (exkl. USt.)</span> <small class=\"text-muted\">Standort: Gütersloh, Deutschland</small></div><div class=\"mb-4\"><a class=\"btn btn-primary me-2\" href=\"mailto:info@meinolf-venker.de\">Per E‑Mail anfragen</a> <a class=\"btn btn-outline-secondary\" href=\"tel:+495241221050\">Anrufen</a></div><h2 class=\"h5\">Beschreibung</h2><p>Max. Schnittlänge: 825 mm<br>Max. Blechstärke: 3 mm&nbsp;Stahl<br>Hydraulischer Antrieb, sehr gepflegter Zustand, revisionsgeprüft. Ideal für präzises Schneiden von Blechen.</p><h2 class=\"h5\">Spezifikationen</h2><table class=\"table table-striped\"><tbody><tr><th>Hersteller</th><td>RAS</td></tr><tr><th>Modell</th><td>83‑25</td></tr><tr><th>Jahr</th><td>1990</td></tr><tr><th>Zustand</th><td>Gebraucht</td></tr><tr><th>Max. Schnittlänge</th><td>825 mm</td></tr><tr><th>Max. Blechstärke</th><td>3 mm (Stahl)</td></tr><tr><th>Gewicht ca.</th><td>1.200 kg</td></tr></tbody></table></div></div></div><p><script>\r\n                      function changeImage(thumbnail, targetId = 'mainImage') {\r\n                        const mainImage = document.getElementById(targetId);\r\n                        mainImage.src = thumbnail.src;\r\n                        \r\n                        // Find the container of the clicked thumbnail to limit the 'active' class scope\r\n                        const container = thumbnail.closest('.d-flex');\r\n                        if (container) {\r\n                          container.querySelectorAll('.thumb-img').forEach(img => img.classList.remove('active'));\r\n                        }\r\n                        thumbnail.classList.add('active');\r\n                      }\r\n                    </script></p>"
