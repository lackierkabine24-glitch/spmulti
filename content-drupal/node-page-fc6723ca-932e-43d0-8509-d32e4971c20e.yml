      value: '<header class="bg-info text-white p-4 text-center"><h1>Compact Tractors for Small Farms and Gardens</h1><p>Your guide to reliable, high-performance mini tractors</p></header><main class="container my-5"><section class="mb-5"><h2>Why Choose a Compact Tractor?</h2><p>Compact tractors, also known as small or mini tractors, are versatile machines designed for use in tight spaces and on smaller plots of land. These tractors are perfect for small-scale farmers, gardeners, and property managers who need powerful equipment in a compact size. Their ease of use, maneuverability, and efficiency make them a top choice for tasks such as mowing, tilling, plowing, and transporting materials.</p></section><section class="row g-4"><h2 class="mb-4">Top Compact Tractors</h2><div class="col-md-6 col-lg-4"><img class="img-fluid rounded shadow-sm" src="/t/1.webp" alt="Compact tractor 1"><h5 class="mt-2">Mini Tractor Model 1</h5><p>Reliable and efficient, model 1 is perfect for small-scale farming and garden tasks.</p></div><div class="col-md-6 col-lg-4"><img class="img-fluid rounded shadow-sm" src="/t/2.webp" alt="Compact tractor 2"><h5 class="mt-2">Mini Tractor Model 2</h5><p>Reliable and efficient, model 2 is perfect for small-scale farming and garden tasks.</p></div><div class="col-md-6 col-lg-4"><img class="img-fluid rounded shadow-sm" src="/t/3.webp" alt="Compact tractor 3"><h5 class="mt-2">Mini Tractor Model 3</h5><p>Reliable and efficient, model 3 is perfect for small-scale farming and garden tasks.</p></div><div class="col-md-6 col-lg-4"><img class="img-fluid rounded shadow-sm" src="/t/4.webp" alt="Compact tractor 4"><h5 class="mt-2">Mini Tractor Model 4</h5><p>Reliable and efficient, model 4 is perfect for small-scale farming and garden tasks.</p></div><div class="col-md-6 col-lg-4"><img class="img-fluid rounded shadow-sm" src="/t/5.webp" alt="Compact tractor 5"><h5 class="mt-2">Mini Tractor Model 5</h5><p>Reliable and efficient, model 5 is perfect for small-scale 