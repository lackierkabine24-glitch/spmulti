il, targetId) {\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const mainImage = document.getElementById(targetId);\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (!mainImage) return;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    mainImage.src = thumbnail.src;\r\n                                                                                                                                                                                                                                                                                                                            