                                                                                                                                                                                                                                                                                                      height: 420px;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    object-fit: cover;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    background: #f8f9fa;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .machine-thumbs {\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    display: grid;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    grid-template-columns: repeat(4, 1fr);\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    gap: .5rem;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .machine-thumbs img {\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    width: 100%;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    height: 88px;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    object-fit: cover;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    cursor: pointer;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    border-radius: .5rem;\r\n                                                                                                                                                                                                   