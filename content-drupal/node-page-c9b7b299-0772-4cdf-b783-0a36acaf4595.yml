      value: "<section class=\"py-5 bg-light\" id=\"used-machines-uae\"><div class=\"container\"><div class=\"row justify-content-center text-center mb-5\"><div class=\"col-xl-10\"><p>&nbsp;</p><p><span class=\"badge bg-warning text-dark mb-3\">Updated May 2026 – Available machines</span></p><h2 class=\"display-5 fw-bold mb-3\">Tested Machines for competitive Prices &amp; Available Stock in Sharjah</h2><p class=\"lead text-secondary mb-3\">Refurbished by experts</p><p class=\"lead text-secondary mb-3\">Browse used CNC machines, aluminium machining centres, roller coating lines, saws, edge banding etc.</p><p class=\"lead text-secondary mb-3\">&nbsp;</p><p class=\"text-secondary\">&nbsp;</p><p><meta name=\"description\" content=\"Used industrial machines for sale in UAE – CNC, aluminium machining centres, press brakes, saws &amp; woodworking equipment. Updated 2026 stock in Sharjah with direct prices and fast availability.\"><style>\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .machine-card {\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    border: 0;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    border-radius: 1rem;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    overflow: hidden;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    box-shadow: 0 .5rem 1.5rem rgba(0,0,0,.08);\r\n                                                                                                                                                                                                                                                                                                                                                             