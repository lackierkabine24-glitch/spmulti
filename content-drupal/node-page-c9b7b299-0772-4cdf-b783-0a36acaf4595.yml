btn-sm btn-outline-primary\" href=\"#machine-14\">14</a></td><td>Edge Banding</td><td>Herbrock</td><td>premium</td><td>Edgebander</td><td>2021</td></tr><tr><td><a class=\"btn btn-sm btn-outline-primary\" href=\"#machine-15\">15</a></td><td>Minipress</td><td>-</td><td>Morbidelli</td><td>Press</td><td>2017</td></tr><tr><td><a class=\"btn btn-sm btn-outline-primary\" href=\"#machine-16\">16</a></td><td>Beam saw</td><td>-</td><td>-</td><td>Woodworking</td><td>2017</td></tr></tbody></table></div></div></div></div><!-- Optional: second column (empty or future machines) --><div class=\"col-lg-6\"><!-- You can add machines 16–20 here later -->&nbsp;</div></div><div class=\"row justify-content-center mb-4\"><div class=\"col-xl-10 text-center\"><p>&nbsp;</p><p>&nbsp;</p><h2 class=\"fw-bold mb-3\">Free delivery in GCC</h2><p class=\"text-secondary mb-0\">List is updated in May 2026</p></div></div><p><!-- MACHINE 1 -->&nbsp;</p><article class=\"card machine-card mb-5\" id=\"machine-1\"><div class=\"row g-0\"><div class=\"col-lg-5 p-3\"><img class=\"machine-main-image rounded-4\" src=\"/u1/10.jpg\" alt=\"Elumatec SBZ 151 aluminium profile machining centre for sale in Sharjah UAE\" width=\"700\" height=\"442\" id=\"machineImage1\"><div class=\"machine-thumbs mt-3\"><img class=\"active\" src=\"/u1/11.jpg\" alt=\"Elumatec SBZ 151 machining centre front view\" width=\"700\" height=\"395\" onclick=\"changeMachineImage(this, &apos;machineImage1&apos;)\"> <img src=\"/u1/12.jpg\" alt=\"Elumatec aluminium profile machining centre side view\" width=\"700\" height=\"395\" onclick=\"changeMachineImage(this, &apos;machineImage1&apos;)\"> <img src=\"/u1/13.jpg\" alt=\"Elumatec SBZ 151 work area detail\" width=\"700\" height=\"395\" onclick=\"changeMachineImage(this, &apos;machineImage1&apos;)\"> <img src=\"/u1/14.jpg\" alt=\"Used Elumatec machining centre in Sharjah\" width=\"700\" height=\"395\" onclick=\"changeMachineImage(this, &apos;machineImage1&apos;)\"></div></div><div class=\"col-lg-7 p-4 p-lg-5\"><p><span class=\"badge bg-success machine-meta-badge mb-2\">Used machine</span></p><h3 class=\"h2 mb-3\">Aluminium Profile Machining Centre</h3><p class=\"text-secondary mb-3\">5-axis machining centre with tool changer for aluminium and PVC profiles</p><div class=\"d-flex flex-wrap gap-2 justify-content-start mb-4\"><span class=\"badge bg-warning text-dark fs-6\">AED 440,000</span> <span class=\"text-muted\">Location: Sharjah</span></div><ul class=\"text-secondary ps-3 mb-4 text-start\"><li>2008 Germany</li><li>Elumatec SBZ 151</li><li>Max. machining length: 10,300 mm</li><li>Y-axis travel: 1,150 mm</li><li>Z-axis travel: 715 mm</li><li>Swivel angle A-axis: 0° to 180°</li><li>Spindle power: 21 kW</li><li>13 standard and 7 special tools</li><li>Loading included in the price</li></ul><div class=\"d-flex flex-wrap gap-2\"><a class=\"btn btn-success\" href=\"https://wa.me/971581262774?text=I%20am%20interested%20in%20Machine%201%20Elumatec%20SBZ%20151\" target=\"_blank\">WhatsApp about Machine 1</a> <a class=\"btn btn-outline-dark\" href=\"/contact\" target=\"_blank\">Request details</a></div></div></div></article><p><!-- MACHINE 2 -->&nbsp;</p><article class=\"card machine-card mb-5\" id=\"machine-2\"><div class=\"row g-0\"><div class=\"col-lg-5 p-3\"><img class=\"machine-main-image rounded-4\" src=\"/u1/20.jpg\" alt=\"RAS 74.30 press brake for sale in Sharjah UAE\" width=\"700\" height=\"525\" id=\"machineImage2\"><div class=\"machine-thumbs mt-3\"><img class=\"active\" src=\"/u1/21.jpg\" alt=\"RAS press brake front view\" width=\"700\" height=\"525\" onclick=\"changeMachineImage(this, &apos;machineImage2&apos;)\"> <img src=\"/u1/22.jpg\" alt=\"RAS 74.30 press brake side view\" width=\"700\" height=\"525\" onclick=\"changeMachineImage(this, &apos;machineImage2&apos;)\"> <img src=\"/u1/23.jpg\" alt=\"RAS press brake tooling area\" width=\"394\" height=\"525\" onclick=\"changeMachineImage(this, &apos;machineImage2&apos;)\"> <img src=\"/u1/24.jpg\" alt=\"Used RAS press brake in Sharjah\" width=\"693\" height=\"525\" onclick=\"changeMachineImage(this, &apos;machineImage2&apos;)\"></div></div><div class=\"col-lg-7 p-4 p-lg-5\"><p><span class=\"badge bg-success machine-meta-badge mb-2\">Used machine</span></p><h3 class=\"h2 mb-3\">Press Brake</h3><p class=\"text-secondary mb-3\">With segmented upper beam tool and Multibend 9000 control, suitable for sheet metal bending operations.</p><div class=\"d-flex flex-wrap gap-2 align-items-center mb-4\"><span class=\"badge bg-warning text-dark fs-6\">AED 251,000</span> <span class=\"text-muted\">Location: Sharjah</span></div><ul class=\"text-secondary ps-3 mb-4 text-start\"><li>Germany 1994</li><li>RAS 74.30</li><li>Control unit: Multibend 9000</li><li>Segmented upper beam tool with automatic tool clamping</li><li>Max. bending length: 3,200 mm</li><li>Max. sheet thickness: 4 mm steel</li><li>Approx. weight: 5,800 kg</li></ul><div class=\"d-flex flex-wrap gap-2\"><a class=\"btn btn-success\" href=\"https://wa.me/971581262774?text=I%20am%20interested%20in%20Machine%202%20RAS%2074.30%20press%20brake\" target=\"_blank\">WhatsApp about Machine 2</a> <a class=\"btn btn-outline-dark\" href=\"/contact\" target=\"_blank\">Request details</a></div></div></div></article><p><!-- MACHINE 3 -->&nbsp;</p><article class=\"card machine-card mb-5\" id=\"machine-3\"><div class=\"row g-0\"><div class=\"col-lg-5 p-3\"><img class=\"machine-main-image rounded-4\" src=\"/u1/30.jpg\" alt=\"Elumatec DG 244 double mitre saw for sale in Sharjah UAE\" width=\"700\" height=\"336\" id=\"machineImage3\"><div class=\"machine-thumbs mt-3\"><img class=\"active\" src=\"/u1/31.jpg\" alt=\"Elumatec DG 244 front view\" width=\"700\" height=\"468\" onclick=\"changeMachineImage(this, &apos;machineImage3&apos;)\"> <img src=\"/u1/32.jpg\" alt=\"Double mitre saw side view\" width=\"700\" height=\"302\" onclick=\"changeMachineImage(this, &apos;machineImage3&apos;)\"> <img src=\"/u1/33.jpg\" alt=\"Elumatec DG 244 cutting area