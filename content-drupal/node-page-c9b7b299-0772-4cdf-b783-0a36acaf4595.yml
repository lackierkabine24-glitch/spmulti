                                                                                                                                                                                                                                          .overview-table th {\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    white-space: nowrap;\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  .sticky-overview-link {\r\n                                                                                                                                              