  body:
    -
      value: "<div class=\"container hero-wrap\"><div class=\"row align-items-top g-4\"><div class=\"col-lg-5\"><p><span class=\"badge badge-soft rounded-pill px-3 py-2 mb-3\">Premium Lead-Formular&nbsp;</span></p><h1 class=\"display-6 fw-semibold mb-3\">Finden wir Ihre Immobilie in Dubai.</h1><p class=\"lead text-white-50 mb-4\">In 60 Sekunden zur passenden Auswahl: Budget, Lage, Typ und Ihre Ziele. Wir melden uns innerhalb von 24 Stunden mit konkreten Optionen.</p><div class=\"d-flex flex-wrap gap-2\"><span class=\"badge badge-soft rounded-pill px-3 py-2\">DSGVO-konforme Anfrage</span> <span class=\"badge badge-soft rounded-pill px-3 py-2\">Deutschsprachige Beratung</span> <span class=\"badge badge-soft rounded-pill px-3 py-2\">Apartments, Villen, Off-Plan</span></div></div><div class=\"col-lg-7\"><div class=\"card card-glass rounded-4\"><div class=\"card-body p-4 p-md-5\"><div class=\"d-flex align-items-start justify-content-between gap-3 mb-3\"><div><h2 class=\"h4 fw-bold section-title mb-1\">Kontakt &amp; Suchprofil</h2><div class=\"small-hint\">Bitte füllen Sie so viel wie möglich aus – das verbessert die Trefferquote.</div></div><div class=\"pill d-none d-md-flex align-items-center gap-2\"><span class=\"small-hint m-0\">Schnell. Klar. Elegant.</span></div></div><div class=\"divider\">&nbsp;</div><form class=\"needs-validation\" id=\"leadForm\" novalidate=\"\"><!-- Contact --><div class=\"row g-3\"><div class=\"col-md-6\"><p><label class=\"form-label req\" for=\"fullName\">Name</label> <input class=\"form-control\" id=\"fullName\" name=\"fullName\" placeholder=\"Vor- und Nachname\" required=\"\"></p><div class=\"invalid-feedback\">Bitte Ihren Namen eingeben.</div></div><div class=\"col-md-6\"><p><label class=\"form-label req\" for=\"email\">E-Mail</label> <input class=\"form-control\" type=\"email\" id=\"email\" name=\"email\" placeholder=\"name@beispiel.de\" required=\"\"></p><div class=\"invalid-feedback\">Bitte eine gültige E-Mail angeben.</div></div><div class=\"col-md-6\"><p><label class=\"form-label\" for=\"phone\">Telefon / WhatsApp</label> <input class=\"form-control\" id=\"phone\" name=\"phone\" placeholder=\"+49 ... / +971 ...\"></p><div class=\"form-text\">Optional, aber hilfreich für schnelle Rückfragen.</div></div><div class=\"col-md-6\"><p><label class=\"form-label req\" for=\"contactPref\">Bevorzugter Kontakt</label> <select class=\"form-select\" id=\"contactPref\" name=\"contactPref\" required=\"\">\r\n                                                        <option value=\"\" selected=\"\" disabled=\"\">Bitte auswählen…</option>\r\n                                                        <option>E-Mail</option>\r\n                                                        <option>WhatsApp</option>\r\n                                                        <option>Telefon</option>\r\n                                                        <option>Video-Call</option>\r\n                                                      </select></p><div class=\"invalid-feedback\">Bitte eine Kontaktart auswählen.</div></div></div><div class=\"divider\">&nbsp;</div><!-- Goal / Idea --><div class=\"row g-3\"><div class=\"col-12\"><p><label class=\"form-label req\">Worum geht es Ihnen hauptsächlich?</label></p><div class=\"d-flex flex-wrap gap-2\"><input class=\"btn-check\" type=\"radio\" name=\"goal\" id=\"goal1\" value=\"Eigennutzung\" required=\"\"> <label class=\"btn btn-outline-dark\" for=\"goal1\">Eigennutzung</label> <input class=\"btn-check\" type=\"radio\" name=\"goal\" id=\"goal2\" value=\"Kapitalanlage\" required=\"\"> <label class=\"btn btn-outline-dark\" for=\"goal2\">Kapitalanlage</label> <input class=\"btn-check\" type=\"radio\" name=\"goal\" id=\"goal3\" value=\"Off-Plan / Neubau\" required=\"\"> <label class=\"btn btn-outline-dark\" for=\"goal3\">Off-Plan / Neubau</label> <input class=\"btn-check\" type=\"radio\" name=\"goal\" id=\"goal4\" value=\"Kurzzeitvermietung\" required=\"\"> <label class=\"btn btn-outline-dark\" for=\"goal4\">Kurzzeitvermietung</label></div><div class=\"invalid-feedback d-block\" style=\"display:none;\" id=\"goalFeedback\">Bitte wählen Sie ein Ziel aus.</div></div><div class=\"col-md-6\"><p><label class=\"form-label req\" for=\"propertyType\">Immobilientyp</label> <select class=\"form-select\" id=\"propertyType\" name=\"propertyType\" required=\"\">\r\n                                                        <option value=\"\" selected=\"\" disabled=\"\">Bitte auswählen…</option>\r\n                                                        <option>Apartment</option>\r\n                                                        <option>Penthouse</option>\r\n                                                        <option>Townhouse</option>\r\n                                                        <option>Villa</option>\r\n                                                        <option>Grundstück</option>\r\n                                                        <option>Gewerbe</option>\r\n                                                      </select></p><div class=\"invalid-feedback\">Bitte einen Immobilientyp auswählen.</div></div><div class=\"col-md-6\"><p><label class=\"form-label req\" for=\"status\">Kaufstatus</label> <select class=\"form-select\" id=\"status\" name=\"status\" required=\"\">\r\n                                                        <option value=\"\" selected=\"\" disabled=\"\">Bitte auswählen…</option>\r\n                                                        <option>Sofort verfügbar</option>\r\n                                                        <option>Neubau (Fertigstellung 6–24 Monate)</option>\r\n                                                        <option>Neubau (Fertigstellung 24+ Monate)</option>\r\n                                                        <option>Unentschlossen / Beratung</option>\r\n                                                      </select></p><div class=\"invalid-feedback\">Bitte den Kaufstatus auswählen.</div></div></div><div class=\"divider\">&nbsp;</div><!-- Location + Budget --><div class=\"row g-3\"><div class=\"col-md-7\"><p><label class=\"form-label\" for=\"areas\">Bevorzugte Lage(n) in Dubai</label> <input class=\"form-control\" id=\"areas\" name=\"areas\" placeholder=\"z.B. Dubai Marina, Downtown, Palm Jumeirah…\"></p><div class=\"small-hint mt-1\">Mehrere Bereiche mit Komma trennen.</div></div><div class=\"col-md-5\"><label class=\"form-label\" for=\"distance\">Nähe zu…</label> <select class=\"form-select\" id=\"distance\" name=\"distance\">\r\n                                                    <option value=\"\" selected=\"\">Keine Präferenz</option>\r\n                                                    <option>Strand</option>\r\n                                                    <option>Metro</option>\r\n                                                    <option>Business District</option>\r\n                                                    <option>Schulen</option>\r\n                                                    <option>Airport</option>\r\n                                                  </select></div><div class=\"col-md-6\"><p><label class=\"form-label req\" for=\"currency\">Budget-Währung</label> <select class=\"form-select\" id=\"currency\" name=\"currency\" required=\"\">\r\n                                                        <option value=\"\" selected=\"\" disabled=\"\">Bitte auswählen…</option>\r\n                                                        <option value=\"AED\">AED (Dirham)</option>\r\n                                                        <option value=\"EUR\">EUR</option>\r\n                                                        <option value=\"USD\">USD</option>\r\n                                                      </select></p><div class=\"invalid-feedback\">Bitte eine Währung auswählen.</div></div><div class=\"col-md-6\"><p><label class=\"form-label req\" for=\"budgetMin\">Preisrahmen (Minimum)</label> <input class=\"form-control\" type=\"number\" id=\"budgetMin\" name=\"budgetMin\" placeholder=\"z.B. 500000\" min=\"0\" step=\"1000\" required=\"\"></p><div class=\"invalid-feedback\">Bitte ein Minimum angeben.</div></div><div class=\"col-md-6\"><p><label class=\"form-label req\" for=\"budgetMax\">Preisrahmen (Maximum)</label> <input class=\"form-control\" type=\"number\" id=\"budgetMax\" name=\"budgetMax\" placeholder=\"z.B. 1200000\" min=\"0\" step=\"1000\" required=\"\"></p><div class=\"invalid-feedback\">Bitte ein Maximum angeben.</div></div><div class=\"col-md-6\"><label class=\"form-label\" for=\"bedrooms\">Schlafzimmer</label> <select class=\"form-select\" id=\"bedrooms\" name=\"bedrooms\">\r\n                                                    <option value=\"\" selected=\"\">Keine Präferenz</option>\r\n                                                    <option>Studio</option>\r\n                                                    <option>1</option><option>2</option><option>3</option><option>4</option><option>5+</option>\r\n                                                  </select></div><div class=\"col-12\"><p><label class=\"form-label\" for=\"features\">Must-haves (optional)</label></p><div class=\"row g-2\"><div class=\"col-6 col-md-4\"><div class=\"form-check\"><input class=\"form-check-input\" type=\"checkbox\" value=\"Meerblick\" id=\"f1\" name=\"features\"> <label class=\"form-check-label\" for=\"f1\">Meerblick</label></div></div><div class=\"col-6 col-md-4\"><div class=\"form-check\"><input class=\"form-check-input\" type=\"checkbox\" value=\"Balkon/Terrasse\" id=\"f2\" name=\"features\"> <label class=\"form-check-label\" for=\"f2\">Balkon/Terrasse</label></div></div><div class=\"col-6 col-md-4\"><div class=\"form-check\"><input class=\"form-check-input\" type=\"checkbox\" value=\"Möbliert\" id=\"f3\" name=\"features\"> <label class=\"form-check-label\" for=\"f3\">Möbliert</label></div></div><div class=\"col-6 col-md-4\"><div class=\"form-check\"><input class=\"form-check-input\" type=\"checkbox\" value=\"Pool/Fitness\" id=\"f4\" name=\"features\"> <label class=\"form-check-label\" for=\"f4\">Pool/Fitness</label></div></div><div class=\"col-6 col-md-4\"><div class=\"form-check\"><input class=\"form-check-input\" type=\"checkbox\" value=\"Parkplatz\" id=\"f5\" name=\"features\"> <label class=\"form-check-label\" for=\"f5\">Parkplatz</label></div></div><div class=\"col-6 col-md-4\"><div class=\"form-check\"><input class=\"form-check-input\" type=\"checkbox\" value=\"Haustierfreundlich\" id=\"f6\" name=\"features\"> <label class=\"form-check-label\" for=\"f6\">Haustierfreundlich</label></div></div></div></div></div><div class=\"divider\">&nbsp;</div><!-- Vibe / Opinion --><div class=\"row g-3\"><div class=\"col-md-6\"><label class=\"form-label\" for=\"timeline\">Wann möchten Sie kaufen?</label> <select class=\"form-select\" id=\"timeline\" name=\"timeline\">\r\n                                                    <option value=\"\" selected=\"\">Keine Angabe</option>\r\n                                                    <option>Sofort (0–4 Wochen)</option>\r\n                                                    <option>1–3 Monate</option>\r\n                                                    <option>3–6 Monate</option>\r\n                                                    <option>6–12 Monate</option>\r\n                                                    <option>12+ Monate</option>\r\n                                                  </select></div><div class=\"col-md-6\"><label class=\"form-label\" for=\"financing\">Finanzierung</label> <select class=\"form-select\" id=\"financing\" name=\"financing\">\r\n                                                    <option value=\"\" selected=\"\">Keine Angabe</option>\r\n                                                    <option>Barzahlung</option>\r\n                                                    <option>Teilfinanzierung</option>\r\n                                                    <option>Ich brauche Beratung</option>\r\n                                                  </select></div><div class=\"col-12\"><p><label class=\"form-label\" for=\"vibe\">Wie fühlen Sie sich bei Dubai als Standort? </label><select class=\"form-select\" id=\"vibe\" name=\"vibe\">\r\n                                                        <option value=\"\" selected=\"\">Bitte auswählen…</option>\r\n                                                        <option>Sehr begeistert – ich will schnell starten</option>\r\n                                                        <option>Interessiert – ich brauche gute Optionen &amp; Zahlen</option>\r\n                                                        <option>Neugierig – erst mal Orientierung</option>\r\n                                                        <option>Skeptisch – bitte ehrlich Vor- &amp; Nachteile</option>\r\n                                                      </select></p><div class=\"small-hint mt-1\">Hilft uns, die Beratung passend zu gestalten.</div></div><div class=\"col-12\"><label class=\"form-label\" for=\"message\">Zusätzliche Hinweise (optional)</label> <textarea class=\"form-control\" id=\"message\" name=\"message\" rows=\"4\" placeholder=\"z.B. bevorzugte Aussicht, Etage, Rendite-Ziel, Familiennähe…\"></textarea></div><div class=\"col-12\"><div class=\"form-check\"><p><input class=\"form-check-input\" type=\"checkbox\" value=\"1\" id=\"consent\" required=\"\"> <label class=\"form-check-label req\" for=\"consent\">Ich stimme zu, dass meine Angaben zur Kontaktaufnahme verarbeitet werden.&nbsp;</label></p><div class=\"invalid-feedback\">Bitte Zustimmung erteilen, um fortzufahren.</div></div><div class=\"small-hint mt-1\">Hinweis: Dieses Formular ist eine Anfrage, kein verbindliches Angebot.</div></div></div><div class=\"d-flex flex-column flex-md-row gap-2 gap-md-3 mt-4\"><button class=\"btn btn-outline-dark flex-grow-1\" type=\"button\" id=\"previewBtn\">\r\n                                              <i class=\"bi bi-eye me-1\"></i> Vorschau\r\n                                            </button> <button class=\"btn btn-gradient flex-grow-1\" type=\"submit\">\r\n                                              <i class=\"bi bi-send me-1\"></i> Anfrage senden\r\n                                            </button></div></form></div></div><p class=\"text-white-50 small mt-3 mb-0\">Tipp: Wenn Sie “Kapitalanlage” wählen, nennen Sie im Feld “Hinweise” gern Ihr Rendite-Ziel (z.B. 6–8% p.a.).</p></div></div></div><!-- Preview Modal --><div class=\"modal fade\" id=\"previewModal\" tabindex=\"-1\" aria-hidden=\"true\"><div class=\"modal-dialog modal-lg modal-dialog-centered\"><div class=\"modal-content\"><div class=\"modal-header\"><h5 class=\"modal-title\">Vorschau Ihrer Anfrage</h5><p><button class=\"btn-close\" type=\"button\" data-bs-dismiss=\"modal\" aria-label=\"Schließen\"></button></p></div><div class=\"modal-body\"><div class=\"small\" id=\"previewContent\">&nbsp;</div></div><div class=\"modal-footer\"><button class=\"btn btn-outline-secondary\" type=\"button\" data-bs-dismiss=\"modal\">Bearbeiten</button> <button class=\"btn btn-gradient\" type=\"button\" id=\"submitFromModal\">\r\n                            <i class=\"bi bi-send me-1\"></i> Jetzt senden\r\n                          </button></div></div></div></div><!-- Bootstrap JS --><script src=\"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js\"></script><script>\r\n    // Bootstrap validation\r\n    (() => {\r\n      const form = document.getElementById('leadForm');\r\n      form.addEventListener('submit', (event) => {\r\n        // custom goal validation (radio group)\r\n        const goalChosen = !!document.querySelector('input[name=\"goal\"]:checked');\r\n        const goalFeedback = document.getElementById('goalFeedback');\r\n        if (!goalChosen) {\r\n          goalFeedback.style.display = 'block';\r\n        } else {\r\n          goalFeedback.style.display = 'none';\r\n        }\r\n        // budget sanity check\r\n        const min = Number(document.getElementById('budgetMin').value || 0);\r\n        const max = Number(document.getElementById('budgetMax').value || 0);\r\n        const budgetOk = (min > 0 && max > 0 && max >= min);\r\n        if (!budgetOk) {\r\n          document.getElementById('budgetMax').setCustomValidity('invalid');\r\n        } else {\r\n          document.getElementById('budgetMax').setCustomValidity('');\r\n        }\r\n        if (!form.checkValidity() || !goalChosen || !budgetOk) {\r\n          event.preventDefault();\r\n          event.stopPropagation();\r\n        } else {\r\n          event.preventDefault(); // demo: prevent actual submit\r\n          // TODO: replace with your endpoint (fetch/AJAX) or real form action\r\n          alert(\"Danke! Ihre Anfrage wurde erfasst (Demo).\");\r\n          form.reset();\r\n          form.classList.remove('was-validated');\r\n        }\r\n        form.classList.add('was-validated');\r\n      }, false);\r\n    })();\r\n    // Preview modal\r\n    const previewBtn = document.getElementById('previewBtn');\r\n    const modalEl = document.getElementById('previewModal');\r\n    const previewModal = new bootstrap.Modal(modalEl);\r\n    const previewContent = document.getElementById('previewContent');\r\n    function esc(str){\r\n      return String(str ?? '').replace(/[&<>\"']/g, m => ({\r\n        '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'\r\n      }[m]));\r\n    }\r\n    function getFeatures(){\r\n      return Array.from(document.querySelectorAll('input[name=\"features\"]:checked')).map(x => x.value);\r\n    }\r\n    function getGoal(){\r\n      const g = document.querySelector('input[name=\"goal\"]:checked');\r\n      return g ? g.value : '';\r\n    }\r\n    function formatMoney(val){\r\n      const n = Number(val || 0);\r\n      if (!n) return '';\r\n      return n.toLocaleString('de-DE');\r\n    }\r\n    function buildPreview(){\r\n      const data = {\r\n        name: document.getElementById('fullName').value,\r\n        email: document.getElementById('email').value,\r\n        phone: document.getElementById('phone').value,\r\n        contactPref: document.getElementById('contactPref').value,\r\n        goal: getGoal(),\r\n        propertyType: document.getElementById('propertyType').value,\r\n        status: document.getElementById('status').value,\r\n        areas: document.getElementById('areas').value,\r\n        distance: document.getElementById('distance').value,\r\n        currency: document.getElementById('currency').value,\r\n        budgetMin: document.getElementById('budgetMin').value,\r\n        budgetMax: document.getElementById('budgetMax').value,\r\n        bedrooms: document.getElementById('bedrooms').value,\r\n        features: getFeatures(),\r\n        timeline: document.getElementById('timeline').value,\r\n        financing: document.getElementById('financing').value,\r\n        vibe: document.getElementById('vibe').value,\r\n        message: document.getElementById('message').value\r\n      };\r\n      const features = data.features.length ? data.features.join(', ') : '—';\r\n      const distance = data.distance || '—';\r\n      const bedrooms = data.bedrooms || '—';\r\n      const timeline = data.timeline || '—';\r\n      const financing = data.financing || '—';\r\n      const vibe = data.vibe || '—';\r\n      const areas = data.areas || '—';\r\n      const phone = data.phone || '—';\r\n      return `\r\n        \r\n<div class=\"row g-3\">\r\n              \r\n    <div class=\"col-md-6\">\r\n                    \r\n        <div class=\"p-3 border rounded-3\">\r\n                          \r\n            <div class=\"fw-semibold mb-1\">\r\n                Kontakt\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Name:</span> ${esc(data.name)}\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">E-Mail:</span> ${esc(data.email)}\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Telefon:</span> ${esc(phone)}\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Kontaktweg:</span> ${esc(data.contactPref)}\r\n            </div>\r\n                        \r\n        </div>\r\n                  \r\n    </div>\r\n              \r\n    <div class=\"col-md-6\">\r\n                    \r\n        <div class=\"p-3 border rounded-3\">\r\n                          \r\n            <div class=\"fw-semibold mb-1\">\r\n                Suchprofil\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Ziel:</span> ${esc(data.goal || '—')}\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Typ:</span> ${esc(data.propertyType || '—')}\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Status:</span> ${esc(data.status || '—')}\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Schlafzimmer:</span> ${esc(bedrooms)}\r\n            </div>\r\n                        \r\n        </div>\r\n                  \r\n    </div>\r\n              \r\n    <div class=\"col-12\">\r\n                    \r\n        <div class=\"p-3 border rounded-3\">\r\n                          \r\n            <div class=\"fw-semibold mb-1\">\r\n                Lage & Budget\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Lagen:</span> ${esc(areas)}\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Nähe zu:</span> ${esc(distance)}\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Budget:</span> ${esc(data.currency)} ${formatMoney(data.budgetMin)} – ${formatMoney(data.budgetMax)}\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Must-haves:</span> ${esc(features)}\r\n            </div>\r\n                        \r\n        </div>\r\n                  \r\n    </div>\r\n              \r\n    <div class=\"col-12\">\r\n                    \r\n        <div class=\"p-3 border rounded-3\">\r\n                          \r\n            <div class=\"fw-semibold mb-1\">\r\n                Details\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Zeitplan:</span> ${esc(timeline)}\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Finanzierung:</span> ${esc(financing)}\r\n            </div>\r\n                          \r\n            <div>\r\n                <span class=\"text-muted\">Dubai-Gefühl:</span> ${esc(vibe)}\r\n            </div>\r\n                          \r\n            <div class=\"mt-2\">\r\n                <span class=\"text-muted\">Hinweise:</span><br>\r\n                ${esc(data.message || '—')}\r\n            </div>\r\n                        \r\n        </div>\r\n                  \r\n    </div>\r\n            \r\n</div>\r\n      `;\r\n    }\r\n    previewBtn.addEventListener('click', () => {\r\n      const form = document.getElementById('leadForm');\r\n      form.classList.add('was-validated');\r\n      const goalChosen = !!document.querySelector('input[name=\"goal\"]:checked');\r\n      const min = Number(document.getElementById('budgetMin').value || 0);\r\n      const max = Number(document.getElementById('budgetMax').value || 0);\r\n      const budgetOk = (min > 0 && max > 0 && max >= min);\r\n      // show errors if not ready\r\n      if (!form.checkValidity() || !goalChosen || !budgetOk) {\r\n        document.getElementById('goalFeedback').style.display = goalChosen ? 'none' : 'block';\r\n        if (!budgetOk) document.getElementById('budgetMax').setCustomValidity('invalid');\r\n        else document.getElementById('budgetMax').setCustomValidity('');\r\n        return;\r\n      }\r\n      previewContent.innerHTML = buildPreview();\r\n      previewModal.show();\r\n    });\r\n    document.getElementById('submitFromModal').addEventListener('click', () => {\r\n      // Trigger submit\r\n      document.getElementById('leadForm').requestSubmit();\r\n      previewModal.hide();\r\n    });\r\n  </script>"
      summary: ''
      format: full_html
      embed_entities: {  }
