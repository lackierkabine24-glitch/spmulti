      value: '<div class="container py-5"><!-- HERO --><div class="text-center mb-5"><h2 class="fw-bold">Powder Coating Booths &amp; Recovery Systems for Industrial Efficiency</h2><p class="lead text-muted">Maximize coating quality, reduce powder loss, and increase productivity with optimized booth designs.</p><p><a class="btn btn-primary btn-lg mt-3" href="/contact">Get Booth Quote</a></p></div><!-- META --><div class="d-none"><meta name="description" content="Industrial powder coating booths with recovery systems. Manual and automatic booths, cyclone systems, fast color change and high efficiency."></div><!-- INTRO --><div class="row mb-5"><div class="col-md-6"><p>Our powder coating booths provide a controlled environment for high-quality finishing with minimal waste.</p><ul><li>Up to 98% powder recovery</li><li>Manual &amp; automatic systems</li><li>Flexible configurations</li></ul></div><div class="col-md-6"><img class="img-fluid rounded-4" src="/p12/19.webp" alt="powder coating booth cyclone recovery system" loading="lazy"></div></div><!-- TYPES --><div class="row g-4 mb-5"><div class="col-md-6"><div class="p-4 border rounded-4"><h4>Manual Booths</h4><p>With trolley container and powder reuse system.</p></div></div><div class="col-md-6"><div class="p-4 border rounded-4"><h4>Fast Color Change Booths</h4><p>Cyclone recovery up to 98% efficiency.</p></div></div></div><!-- LAB --><div class="text-center mb-5"><h3>Small Booth Systems</h3><img class="img-fluid rounded-4" src="/p12/2.webp" alt="small powder coating booth lab system" loading="lazy"></div><!-- VARIANTS --><div class="container py-5"><h3 class="text-center mb-4">Booth Variants</h3><div class="row g-4"><div class="col-md-3 text-center"><img class="img-fluid rounded-4" src="/p12/1.webp" alt="powder booth 3 filters" loading="lazy"><p>3 Filters</p></div><div class="col-md-3 text-center"><img class="img-fluid rounded-4" src="/p12/17.webp" alt="mobile powder booth 3 filters" loading="lazy"><p>3 Filters Mobile</p></div><div class="col-md-3 text-center"><img class="img-fluid rounded-4" src="/p12/15.webp" alt="powder booth 5 filters" loading="lazy"><p>5 Filters</p></div><div class="col-md-3 text-center"><img class="img-fluid rounded-4" src="/p12/16.webp" alt="repeatable powder coating booth" loading="lazy"><p>Repeatable Application</p></div><div class="col-md-3 text-center"><img class="img-fluid rounded-4" src="/p12/3.webp" alt="automatic manual booth" loading="lazy"><p>Automatic &amp; Manual</p></div><div class="col-md-3 text-center"><img class="img-fluid rounded-4" src="/p12/4.webp" alt="chain conveyor booth" loading="lazy"><p>Chain Conveyor</p></div><div class="col-md-3 text-center"><img class="img-fluid rounded-4" src="/p12/5.webp" alt="aluminium profile booth" loading="lazy"><p>Aluminium Profiles</p></div><div class="col-md-3 text-center"><img class="img-fluid rounded-4" src="/p12/6.webp" alt="cyclone separator booth" loading="lazy"><p>Cyclone System</p></div></div></div><!-- INDUSTRIAL --><div class="row g-4 mb-5 text-center"><div class="col-md-4"><img class="img-fluid rounded" src="/p12/21.webp" alt="large booth system" loading="lazy"><p>Large Workpieces</p></div><div class="col-md-4"><img class="img-fluid rounded" src="/p12/20.webp" alt="powder chamber" loading="lazy"><p>Powder Chamber</p></div><div class="col-md-4"><img class="img-fluid rounded" src="/p12/13.webp" alt="semi automatic booth" loading="lazy"><p>Semi Automatic</p></div></div><!-- DIMENSIONS --><div class="mb-5"><h3 class="text-center">Booth Dimensions</h3><p class="text-center">Custom sizes available on request.</p></div><!-- BENEFITS --><div class="row text-center mb-5"><div class="col-md-3"><h5>Low Loss</h5><p>Efficient recovery systems</p></div><div class="col-md-3"><h5>Flexible</h5><p>Custom booth designs</p></div><div class="col-md-3"><h5>Efficient</h5><p>Optimized airflow</p></div><div class="col-md-3"><h5>Quality</h5><p>Uniform coating</p></div></div><!-- CTA --><div class="text-center bg-dark t