          value: "<div class=\"container py-5\"><section class=\"mb-5\"><div class=\"row align-items-stretch g-4\"><!-- LEFT TEXT --><div class=\"col-lg-6\"><div class=\"p-4 p-lg-5 border rounded-4 shadow-sm h-100\"><h2 class=\"fw-bold mb-3\">AWS Serverless Engineer, TypeScript Backend Entwickler &amp; DevOps Partner</h2><p class=\"lead text-muted mb-4\">Ich unterstütze Unternehmen beim Aufbau sauberer, skalierbarer Backends mit AWS, TypeScript, NestJS, Node.js und moderner DevOps-Infrastruktur.</p><p class=\"mb-4\">Ob MVP, SaaS-Plattform, interne Tools oder AI-Integration: Ich entwickle Systeme, die stabil laufen, gut wartbar bleiben und mit Ihrem Produkt wachsen.</p><div class=\"d-flex flex-wrap gap-2 mb-4\"><span class=\"badge text-bg-dark px-3 py-2\">AWS Lambda</span> <span class=\"badge text-bg-dark px-3 py-2\">TypeScript</span> <span class=\"badge text-bg-dark px-3 py-2\">NestJS</span> <span class=\"badge text-bg-dark px-3 py-2\">Node.js</span> <span class=\"badge text-bg-dark px-3 py-2\">DevOps</span> <span class=\"badge text-bg-dark px-3 py-2\">LangChain</span> <span class=\"badge text-bg-dark px-3 py-2\">AI Integrationen</span></div><div class=\"d-flex flex-column flex-sm-row gap-3\"><a class=\"btn btn-primary btn-lg\" href=\"/de/contact\" target=\"_blank\">Jetzt kontaktieren</a> <a class=\"btn btn-outline-primary btn-lg\" href=\"#services\">Leistungen ansehen</a></div></div></div><!-- STATS --><div class=\"col-lg-3\"><div class=\"p-4 border rounded-4 shadow-sm h-100\"><h5 class=\"mb-4\">Warum Kunden mich buchen</h5><div class=\"row g-3 text-center\"><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><strong>100%</strong><br><small>Erfolgsrate</small></div></div><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><strong>Top Rated</strong><br><small>Upwork</small></div></div><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><strong>31</strong><br><small>Projekte</small></div></div><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><strong>1464</strong><br><small>Stunden</small></div></div><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><strong>7 Jahre Erfahrung</strong><br><small>Seit 2019</small></div></div></div></div></div><!-- PROFILE --><div class=\"col-lg-3\"><div class=\"p-4 border rounded-4 shadow-sm h-100 text-center\"><img class=\"img-fluid rounded-circle mb-3\" style=\"max-width:150px;\" src=\"/p/hamza.png\" alt=\"Hamza AWS Engineer\" width=\"1254\" height=\"1254\"><h6 class=\"mb-1\">Hamza</h6><p><small class=\"text-muted d-block mb-3\">AWS Serverless Engineer</small></p><img src=\"/sites/default/files/inline-images/flaggen.png\" alt=\"aws serverless engineer in Schweiz, Deutschland, Österreich\" width=\"50%\" height=\"50%\"><div class=\"row g-2 text-center\"><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><strong>100%</strong><br><small>Success</small></div></div><div class=\"col-6\"><div class=\"p-2 border rounded-3\"><p><strong>Top</strong><br><small>Rated</small></p></div></div><p>Wir antworten heute ! Email an&nbsp;<script>\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.write(\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    '<a href=\"mailto:' + 'contact' + '@' + 'salespeare.com' + '\">contact@salespeare.com</a>'\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  );\r\n                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </script></p><p>Videocall buchen</p><p><small>Tel: +41 61 588 null-null 15 Whatsapp +41 79 475 72 drei-drei&nbsp;</small></p></div></div></div></div></section></div><div class=\"d-none\"><meta name=\"description\" content=\"AWS Serverless Engineer aus Dubai für TypeScript Backends, NestJS APIs, DevOps, Kubernetes und AI Integrationen. Skalierbare Systeme, klare Kommunikation und saubere Architektur für SaaS, MVPs und Produkte.\"></div><section class=\"mb-5\"><div class=\"row g-4\"><div class=\"col-md-4\"><div class=\"p-4 border rounded-4 shadow-sm h-100\"><h3 class=\"h5 mb-3\">Saubere Architektur statt Schnelllösungen</h3><p class=\"mb-0 tex