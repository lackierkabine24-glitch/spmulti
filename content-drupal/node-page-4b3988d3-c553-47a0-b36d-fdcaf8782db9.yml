      value: '<section class="py-5" style="background-color:#ecfeff;"><div class="container"><div class="row justify-content-center"><div class="col-12 col-xl-10"><!-- HERO --><div class="rounded-4 shadow-lg overflow-hidden mb-5"><div class="p-5"><h1 class="display-6 fw-bold text-dark mb-3">Outdoor Marble Abu Dhabi – Premium Stone for Villas, Pools &amp; Terraces</h1><p class="lead text-dark mb-0">Durable outdoor marble and natural stone solutions for Abu Dhabi villas, landscaping, pool decks, patios, and exterior flooring projects.</p></div></div><!-- WHATSAPP --><div class="text-center mb-5"><a class="btn btn-success btn-lg rounded-pill px-5 shadow" href="https://wa.me/971581262774?text=I%20am%20interested%20in%20outdoor-marble-abu-dhabi.%20Please%20send%20prices%20and%20availability." target="_blank">📲 Get Prices on WhatsApp&nbsp;</a></div><!-- FEATURE IMAGE --><div class="text-center mb-5"><div class="card border-0 shadow-lg rounded-4 mx-auto" style="max-width:560px;"><div class="card-body"><h2 class="fw-bold text-dark">Outdoor Marble for Abu Dhabi Climate</h2><img class="img-fluid rounded-4" src="/77/outdoor-marble-abu-dhabi-1.jpg" alt="Outdoor marble Abu Dhabi villa flooring luxury natural stone" width="1200" height="900"><p class="mt-3 fst-italic">“Luxury outdoor stone surfaces built for elegant villas and premium landscapes.”</p></div></div></div><!-- BENEFITS --><div class="row g-4 mb-5"><div class="col-md-4"><div class="p-4 rounded-4 shadow bg-white text-center h-100"><h3 class="fw-bold text-success">Villa &amp; Pool Areas</h3><p>Ideal for patios, pool decks, garden paths, and outdoor seating areas</p></div></div><div class="col-md-4"><div class="p-4 rounded-4 shadow bg-white text-center h-100"><h3 class="fw-bold text-primary">Premium Natural Finish</h3><p>Elegant marble and stone textures for luxury outdoor design</p></div></div><div class="col-md-4"><div class="p-4 rounded-4 shadow bg-white text-center h-100"><h3 class="fw-bold text-success">Abu Dhabi Supply</h3><p>Fast support for contractors, designers, and villa owners</p></div></div></div><!-- PRODUCTS --><div class="row g-4 mb-5"><div class="col-md-6 col-lg-3"><div class="card border-0 shadow-lg rounded-4 h-100"><img class="card-img-top" src="/77/outdoor-marble-abu-dhabi-2.jpg" alt="Outdoor marble Abu Dhabi villa flooring luxury natural stone" width="1200" height="1600"><div class="card-body"><h3 class="h6 fw-bold text-dark">Villa Outdoor Marble</h3><p class="small">Elegant marble flooring for premium villa exteriors</p></div><div class="card-footer bg-transparent"><a class="btn btn-primary w-100" href="/contact">Get Price</a></div></div></div><div class="col-md-6 col-lg-3"><div class="card border-0 shadow-lg rounded-4 h-100"><img class="card-img-top" src="/77/outdoor-marble-abu-dhabi-3.jpg" alt="Marble pool deck Abu Dhabi natural stone outdoor tiles" width="1200" height="1600"><div class="card-body"><h3 class="h6 fw-bold text-dark">Pool Deck Marble</h3><p class="small">Beautiful outdoor stone around pools and water features</p></div><div class="card-footer bg-transparent"><a class="btn btn-primary w-100" href="/contact">Get Price</a></div></div></div><div class="col-md-6 col-lg-3"><div class="card border-0 shadow-lg rounded-4 h-100"><img class="card-img-top" src="/77/outdoor-marble-abu-dhabi-4.jpg" alt="Exterior marble tiles Abu Dhabi patio terrace flooring" width="1200" height="1600"><div class="card-body"><h3 class="h6 fw-bold text-dark">Patio &amp; Terrace Tiles</h3><p class="small">Outdoor marble for terraces, balconies, and seating zones</p></div><div class="card-footer bg-transparent"><a class="btn btn-primary w-100" href="/contact">Get Price</a></div></div></div><div class="col-md-6 col-lg-3"><div class="card border-0 shadow-lg rounded-4 h-100"><img class="card-img-top" src="/77/outdoor-marble-abu-dhabi-5.jpg" alt="Outdoor stone cladding Abu Dhabi marble façade design" width="1200" height="1600"><div class="card-body"><h3 class="h6 fw-bold text-dark">Exterior Cladding</h3><p class="small">Stone and marble finishes for façades and outdoor walls</p></div><div class="card-footer bg-transparent"><a class="btn btn-primary w-100" href="/contact">Get Price</a></div></div></div></div><!-- SEO CONTENT --><div class="p-4 rounded-4 shadow bg-white mb-5"><h2 class="fw-bold text-dark mb-3">Outdoor Marble Supplier in Abu Dhabi</h2><p>Outdoor marble is a premium choice for Abu Dhabi villas, hospitality projects, landscaping areas, and luxury exterior floors where natural beauty matters.</p><p>We help select marble and stone finishes suitable for outdoor use, project quantity, budget, and design style.</p></div><!-- CTA --><div class="text-center"><div class="p-5 rounded-4 shadow-lg bg-success text-white"><h2 class="fw-bold mb-3">Get Outdoor Marble Prices in Abu Dhabi</h2><p>Contact us for outdoor marble options, sizes, finishes, and project supply.</p><p><a class="btn btn-light btn-lg rounded-pill px-5" href="/contact">Request Quote</a></p></div></div></div></div></div></section><section class="section-soft py-5"><div class="container"><h2 class="mb-4">Related stone products</h2><div class="row g-4"><div class="col-md-4"><div class="card p-4"><h3 class="h5">Polished high quality marble</h3><p class="text-muted">Any natural design available</p><p><a class="fw-bold" href="/polished-marble">Open page</a></p></div></div><div class="col-md-4"><div class="card p-4"><h3 class="h5">Lime Stone</h3><p class="text-muted">Lime Stone</p><p><a class="fw-bold" href="/lime-stone">Open page</a></p></div></div><div class="col-md-4"><div class="card p-4"><h3 class="h5">Porcelain Tiles Dubai</h3><p class="text-muted">Premium slabs at direct factory prices</p><p><a class="fw-bold" href="/porcelain-tiles-dubai">Open page</a></p></div></div><div class="col-md-4"><div class="card p-4"><h3 class="h5">Ceramic Tiles RAK</h3><p class="text-muted">Premium slabs at direct factory prices</p><p><a class="fw-bold" href="/ceramic-tiles-rak">Open page</a></p></d