  body:
    -
      value: '<section class="py-5" style="background-color:#f0fdf4;"><div class="container"><div class="row justify-content-center"><div class="col-12 col-xl-10"><!-- HERO --><div class="rounded-4 shadow-lg overflow-hidden mb-5"><div class="p-5"><h2 class="display-6 fw-bold text-dark mb-3">Privacy Policy &amp; Your Rights (USA 2026)</h2><p class="lead text-dark mb-0">Learn how we protect your data and what rights you have under modern privacy regulations.</p></div></div><!-- RIGHTS --><div class="rounded-4 shadow-lg p-4 p-md-5 mb-5 bg-white"><h2 class="h4 fw-bold text-success mb-3">Your Data Rights</h2><ul class="text-dark"><li>✔ Request access to your personal data</li><li>✔ Request correction of inaccurate data</li><li>✔ Request deletion of your data</li><li>✔ Restrict or object to processing</li><li>✔ Withdraw consent at any time</li><li>✔ Request data portability</li><li>✔ File a complaint with a data protection authority</li></ul></div><!-- DETAILS --><div class="row g-4 mb-5"><div class="col-md-6"><div class="card border-0 shadow-lg rounded-4 h-100"><div class="card-body"><h3 class="fw-bold text-primary">How to Exercise Your Rights</h3><p>You may contact us at any time to exercise your rights. Requests are processed free of charge and handled within 30 days as required by law.</p></div></div></div><div class="col-md-6"><div class="card border-0 shadow-lg rounded-4 h-100"><div class="card-body"><h3 class="fw-bold text-success">Right to Object</h3><p>You may object to data processing at any time, especially for marketing purposes. We will stop processing unless legally required otherwise.</p></div></div></div></div><!-- LEGAL --><div class="rounded-4 shadow-lg p-4 p-md-5 mb-5 bg-white"><h2 class="h4 fw-bold text-success mb-3">Legal Use of Data</h2><p class="text-dark">Your data may be used for legal compliance, enforcement of rights, or protection against misuse. We may disclose data if required by law or authorities.</p></div><!-- SYSTEM --><div class="rounded-4 shadow-lg p-4 p-md-5 mb-5 bg-white"><h2 class="h4 fw-bold text-success mb-3">System Logs &amp; Maintenance</h2><p class="text-dark">We collect technical data such as IP addresses and logs to ensure security, stability, and performance.</p></div><!-- COOKIES --><div class="rounded-4 shadow-lg p-4 p-md-5 mb-5 bg-white"><h2 class="h4 fw-bold text-success mb-3">Cookies &amp; Tracking</h2><p class="text-dark">We use cookies and tracking technologies to improve user experience and measure performance. You can manage your preferences at any time.</p></div><!-- POLICY UPDATE --><div class="text-center mb-5"><div class="p-5 rounded-4 shadow-lg bg-success text-white"><h2 class="fw-bold">Policy Updates</h2><p>We may update this policy at any time. Please review it regularly.</p></div></div><!-- CTA --><div class="text-center"><div class="p-5 rounded-4 shadow-lg bg-primary text-white"><h2 class="fw-bold mb-3">Questions About Your Data?</h2><p>Contact our team anytime for privacy-related inquiries</p><p><a class="btn btn-light btn-lg rounded-pill px-5" href="/contact">Contact Us</a></p></div></div></div></div></div></section>'
      summary: ''
      format: full_html
