      value: "<p><strong>Everything you need to complete GHG reporting — faster, easier, and fully compliant.</strong></p><p>&nbsp;</p><p style=\"color:#475569;font-size:18px;line-height:1.6;\">From environmental assessments and risk analysis to real-time monitoring and reporting, Salespeare gives you a complete, end-to-end solution in one place.</p><div class=\"hero text-center\"><div class=\"container\"><title class=\"fw-bold mb-4\">Cut Costs, Eliminate Supplier Risk, and Stay Compliant — All in One Platform</title><div class=\"container my-5\"><div class=\"row g-4\"><div class=\"col-lg-4 col-md-6\"><img class=\"img-fluid rounded shadow-sm\" src=\"/82/ghg_image_1.png\" alt=\"GHG emissions dashboard UAE\" width=\"1536\" height=\"1536\"></div><div class=\"col-lg-4 col-md-6\"><img class=\"img-fluid rounded shadow-sm\" src=\"/82/ghg_image_2.png\" alt=\"GHG compliance deadline UAE 2026\" width=\"1536\" height=\"1536\"></div><div class=\"col-lg-4 col-md-6\"><img class=\"img-fluid rounded shadow-sm\" src=\"/82/ghg_image_3.png\" alt=\"ESG analytics dashboard platform\" width=\"1536\" height=\"2304\"></div></div></div><p class=\"lead mb-4\">Salespeare helps contractors and industrial operators reduce hidden costs, automate subcontractor vetting, and meet ESG regulations with AI-powered insights.</p><p><a class=\"btn btn-primary btn-lg\" href=\"/contact\">Request a Demo</a></p></div></div><p><meta name=\"description\" content=\"Salespeare enables contractors and factories to reduce energy costs, automate subcontractor prequalification, and meet UAE ESG and carbon compliance with AI-driven insights.\"><!-- ENERGY --></p><section class=\"section section-light\"><div class=\"container\"><h2 class=\"mb-4\">Energy Intelligence That Pays for Itself</h2><p>Factories running CNC lines, spray booths, and kilns often pay for energy they cannot see. Salespeare reveals exactly where costs are generated — across machines, shifts, and processes.</p><div class=\"row mt-5\"><div class=\"col-md-4\"><div class=\"card p-4\"><h2 class=\"h5\">Full Visibility</h2><p>See which machines and operations consume the most energy.</p></div></div><div class=\"col-md-4\"><div class=\"card p-4\"><h2 class=\"h5\">Immediate ROI</h2><p>Clear roadmap to reduce energy costs from day one.</p></div></div><div class=\"col-md-4\"><div class=\"card p-4\"><h2 class=\"h5\">No Disruption</h2><p>No hardware. No downtime. Just actionable insights.</p></div></div></div></div></section><hr><p><!-- SUPPLIER -->&nbsp;</p><section class=\"section section-soft\"><div class=\"container\"><h2 class=\"mb-4\">AI-Powered Supplier Pre-qualification</h2><div class=\"container\"><div class=\"row justify-content-center g-4 align-items-center text-center\"><div class=\"col-md-6\"><img class=\"img-fluid rounded shadow-sm\" style=\"max-height:420px;object-fit:cover;\" src=\"/82/ghg_image_4.png\" alt=\"GHG reporting interface\" width=\"1015\" height=\"1523\"></div><div class=\"col-md-6\"><img class=\"img-fluid rounded shadow-sm\" style=\"max-height:420px;object-fit:cover;\" src=\"/82/ghg_image_5.png\" alt=\"GHG emissions dashboard\" width=\"1020\" height=\"1530\"></div></div></div><p>Standardize subcontractor evaluation with AI-assisted, human-verified workflows. Faster decisions, reduced risk, and full auditability.</p><div class=\"row mt-5\"><div class=\"col-md-6\"><ul><li>Evaluate across <span class=\"highlight\">47 compliance dimensions</span></li><li>AI scoring with human verification</li><li>Centralized document and evidence tracking</li><li>Real-time supplier risk insights</li></ul></div><div class=\"col-md-6\"><ul><li>Instant supplier discovery</li><li>Rank suppliers by project fit</li><li>Track submissions and approvals</li><li>Scale across large contractor ecosystems</li></ul></div></div></div></section><hr><p><!-- PROCESS -->&nbsp;</p><section class=\"section section-light\"><div class=\"container\"><h2 class=\"mb-4\">How It Works</h2><div class=\"row\"><div class=\"col-md-4\"><div class=\"card p-4 mb-3\"><h2 class=\"h6\">1. Discover</h2><p>Find suppliers based on sector, location, and experience.</p></div></div><div class=\"col-md-4\"><div class=\"card p-4 mb-3\"><h2 class=\"h6\">2. Analyze</h2><p>Run AI-powered fit and compliance analysis.</p></div></div><div class=\"col-md-4\"><div class=\"card p-4 mb-3\"><h2 class=\"h6\">3. Collect</h2><p>Suppliers submit structured forms and documents.</p></div></div><div class=\"col-md-4\"><div class=\"card p-4 mb-3\"><h2 class=\"h6\">4. Validate</h2><p>AI verifies evidence relevance and completeness.</p></div></div><div class=\"col-md-4\"><div class=\"card p-4 mb-3\"><h2 class=\"h6\">5. Review</h2><p>Your team confirms and finalizes evaluation.</p></div></div><div class=\"col-md-4\"><div class=\"card p-4 mb-3\"><h2 class=\"h6\">6. Decide</h2><p>Get final risk scores and actionable insights.</p></div></div></div></div></section><hr><p><!-- SCORING -->&nbsp;</p><section class=\"section section-light\"><div class=\"container\"><h2 class=\"mb-4\">Transparent Supplier Scoring</h2><p>Each supplier receives a clear, auditable score:</p><ul><li>Document Completeness – 30%</li><li>Regulatory Compliance – 25%</li><li>HSE Record – 20%</li><li>Financial Health – 15%</li><li>ESG Commitment – 10%</li></ul></div></section><hr><p><!-- ESG -->&nbsp;</p><section class=\"section section-accent\"><div class=\"container\"><h2 class=\"mb-4\">Built for UAE ESG &amp; Carbon Compliance</h2><p>Stay ahead of regulatory requirements and avoid penalties.</p><div class=\"card p-4 mt-4\"><p><strong>Deadline:</strong> 30 May 2026</p><p>Mandatory Scope 1 &amp; 2 emissions tracking. Scope 3 expanding.</p><p>Non-compliance risks include fines, license suspension, and blacklisting.</p></div></div></section><hr><p><!-- ADDONS -->&nbsp;</p><section class=\"section section-light\"><div class=\"container\"><h2 class=\"mb-4\">Expand Beyond Energy &amp; Procurement</h2><ul><li><strong>HSE:</strong> Reduce incidents and liability</li><li><strong>Waste &amp; Circular Economy:</strong> Recover material value</li><li><strong>ESG Reporting:</strong> Meet investor &amp; regulatory demands</li></ul><p class=\"mt-3\">One platform. One data layer. Multiple value streams.</p></div></section><p><!-- CTA -->&nbsp;</p><section class=\"section text-center\" style=\"background-color:#020617;color:white;\"><div class=\"container\"><h2 class=\"mb-3\">Ready to Reduce Costs and Eliminate Risk?</h2><p class=\"mb-4\">See Salespeare in action in a 20-minute demo.</p><p><a class=\"btn btn-primary btn-lg\" href=\"/contact\">Book a Demo</a></p></div></section><p><!-- GHG Deadline Modal -->&nbsp;</p><div class=\"modal fade\" id=\"ghgModal\" tabindex=\"-1\"><div class=\"modal-dialog modal-dialog-centered\"><div class=\"modal-content p-4 text-center\" style=\"border-radius:16px;\"><div class=\"modal-body\"><h2 class=\"fw-bold mb-3\" style=\"font-size:28px;\">GHG Emissions Reporting unique AI Tool</h2><p class=\"mb-4\" style=\"font-size:18px;\">Deadline May 2026. Avoid fines. Contact us now.</p><p><a class=\"btn btn-primary btn-lg px-4\" href=\"/contact\" target=\"_blank\">Contact Salespeare&nbsp;</a></p></div></div></div></div><p><!-- Trigger Script --><script>\r\n                                                                      document.addEventListener(\"DOMContentLoaded\", function () {\r\n                                                                        setTimeout(function () {\r\n                                                                          var ghgModal = new bootstrap.Modal(document.getElementById('ghgModal'));\r\n                                                                          ghgModal.show();\r\n                                                                        }, 5000);\r\n                                                                      });\r\n                                                                    </script></p><hr><meta charset=\"utf-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"><title>UAE GHG Emissions Calculator</title><!-- Bootstrap 5 only. Remove this line if Bootstrap 5 is already loaded on your website. --><link href=\"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css\" rel=\"stylesheet\"><!--\r\n    Scoped styles only.\r\n    Everything is inside .uae-ghg-calculator, so it should not change your website CSS.\r\n  --><style>\r\n    .uae-ghg-calculator {\r\n      --ghg-navy: #06243d;\r\n      --ghg-green: #35a852;\r\n      --ghg-teal: #0ea5a3;\r\n      --ghg-light: #f7fafc;\r\n      --ghg-muted: #6b7b8c;\r\n      --ghg-border: rgba(6, 36, 61, .12);\r\n      --ghg-shadow: 0 18px 45px rgba(3, 25, 43, .12);\r\n      color: #203040;\r\n    }\r\n    .uae-ghg-calculator .ghg-card {\r\n      border: 1px solid var(--ghg-border);\r\n      border-radius: 1.5rem;\r\n      box-shadow: var(--ghg-shadow);\r\n      overflow: hidden;\r\n      background: #fff;\r\n    }\r\n    .uae-ghg-calculator .ghg-hero {\r\n      background:\r\n        radial-gradient(circle at top left, rgba(53, 168, 82, .16), transparent 35%),\r\n        linear-gradient(135deg, #f8fbfd 0%, #eef7f1 100%);\r\n      border-radius: 1.75rem;\r\n      border: 1px solid rgba(6, 36, 61, .08);\r\n    }\r\n    .uae-ghg-calculator .ghg-title {\r\n      color: var(--ghg-navy);\r\n      letter-spacing: -.04em;\r\n      line-height: 1.05;\r\n    }\r\n    .uae-ghg-calculator .ghg-eyebrow {\r\n      display: inline-flex;\r\n      align-items: center;\r\n      gap: .45rem;\r\n      padding: .45rem .75rem;\r\n      border-radius: 50rem;\r\n      font-size: .875rem;\r\n      font-weight: 700;\r\n      color: #16743a;\r\n      background: rgba(53, 168, 82, .12);\r\n      border: 1px solid rgba(53, 168, 82, .2);\r\n    }\r\n    .uae-ghg-calculator .ghg-result-panel {\r\n      background: linear-gradient(180deg, var(--ghg-navy), #0b3556);\r\n      color: #fff;\r\n    }\r\n    .uae-ghg-calculator .ghg-result-number {\r\n      font-size: clamp(3rem, 7vw, 5rem);\r\n      font-weight: 900;\r\n      letter-spacing: -.07em;\r\n      line-height: .95;\r\n    }\r\n    .uae-ghg-calculator .ghg-btn {\r\n      background: linear-gradient(135deg, var(--ghg-green), #168d43);\r\n      border: 0;\r\n      color: #fff;\r\n      font-weight: 700;\r\n      border-radius: 50rem;\r\n      box-shadow: 0 12px 24px rgba(53, 168, 82, .24);\r\n    }\r\n    .uae-ghg-calculator .ghg-btn:hover,\r\n    .uae-ghg-calculator .ghg-btn:focus {\r\n      color: #fff;\r\n      background: linear-gradient(135deg, #2f974b, #137b3a);\r\n    }\r\n    .uae-ghg-calculator .ghg-input-card {\r\n      background: var(--ghg-light);\r\n      border: 1px solid rgba(6, 36, 61, .08);\r\n      border-radius: 1rem;\r\n      padding: 1rem;\r\n      height: 100%;\r\n    }\r\n    .uae-ghg-calculator .form-label {\r\n      color: var(--ghg-navy);\r\n      font-weight: 700;\r\n      margin-bottom: .5rem;\r\n    }\r\n    .uae-ghg-calculator .form-control,\r\n    .uae-ghg-calculator .form-select {\r\n      border-radius: .85rem;\r\n      border-color: rgba(6, 36, 61, .15);\r\n      padding: .75rem .9rem;\r\n    }\r\n    .uae-ghg-calculator .form-control:focus,\r\n    .uae-ghg-calculator .form-select:focus {\r\n      border-color: var(--ghg-green);\r\n      box-shadow: 0 0 0 .25rem rgba(53, 168, 82, .15);\r\n    }\r\n    .uae-ghg-calculator .form-range {\r\n      accent-color: var(--ghg-green);\r\n    }\r\n    .uae-ghg-calculator .progress {\r\n      height: .65rem;\r\n      background: rgba(255,255,255,.16);\r\n      border-radius: 50rem;\r\n    }\r\n    .uae-ghg-calculator .progress-bar {\r\n      background: linear-gradient(90deg, #7bd56f, var(--ghg-green));\r\n    }\r\n    .uae-ghg-calculator .ghg-breakdown-row {\r\n      display: grid;\r\n      grid-template-columns: 92px 1fr 60px;\r\n      gap: .75rem;\r\n      align-items: center;\r\n      font-size: .9rem;\r\n    }\r\n    .uae-ghg-calculator .ghg-lead-box {\r\n      background: rgba(255,255,255,.1);\r\n      border: 1px solid rgba(255,255,255,.16);\r\n      border-radius: 1rem;\r\n    }\r\n    .uae-ghg-calculator .ghg-feature {\r\n      border: 1px solid rgba(6, 36, 61, .08);\r\n      border-radius: 1.25rem;\r\n      box-shadow: 0 10px 28px rgba(6, 36, 61, .06);\r\n      height: 100%;\r\n    }\r\n    .uae-ghg-calculator .ghg-feature-icon {\r\n      width: 48px;\r\n      height: 48px;\r\n      display: inline-grid;\r\n      place-items: center;\r\n      border-radius: 1rem;\r\n      color: var(--ghg-green);\r\n      background: rgba(53, 168, 82, .12);\r\n      font-size: 1.35rem;\r\n    }\r\n    .uae-ghg-calculator .text-muted {\r\n      color: var(--ghg-muted) !important;\r\n    }\r\n    @media (max-width: 767.98px) {\r\n      .uae-ghg-calculator .ghg-breakdown-row {\r\n        grid-template-columns: 78px 1fr 52px;\r\n      }\r\n    }\r\n  </style><!--\r\n    Embed this whole section into your webpage.\r\n    If your site already has Bootstrap 5, keep only this section + scoped style + script.\r\n  --><section class=\"uae-ghg-calculator py-5\"><div class=\"container\"><div class=\"ghg-hero p-4 p-lg-5 mb-4\"><div class=\"row align-items-center g-4\"><div class=\"col-lg-7\"><div class=\"ghg-eyebrow mb-3\">UAE GHG Reporting Calculator</div><h1 class=\"ghg-title display-5 fw-bold mb-3\">Estimate emissions. Show the value of easier GHG reporting.</h1><p class=\"lead text-muted mb-4\">Visitors estimate their annual CO2e footprint, then request a demo of your GHG reporting software.</p><p><a class=\"btn ghg-btn px-4 py-3\" href=\"#ghg-calculator-form\">Calculate My Footprint</a></p></div><div class=\"col-lg-5\"><div class=\"card border-0 shadow-sm rounded-4\"><div class=\"card-body p-4\"><div class=\"text-muted small fw-semibold mb-1\">Live estimate</div><div class=\"h1 fw-bold ghg-title mb-1\"><span data-ghg-output=\"heroTotal\">0.00</span> tCO2e</div><p class=\"text-muted mb-0\">Annual footprint preview based on calculator inputs.</p></div></div></div></div></div><div class=\"ghg-card\"><div class=\"row g-0\"><div class=\"col-lg-8\"><div class=\"p-4 p-lg-5\"><div class=\"mb-4\"><h2 class=\"ghg-title h1 fw-bold mb-2\">Carbon Footprint Calculator</h2><p class=\"text-muted mb-0\">Values are indicative. Replace the emission factors in the script with your verified factors for formal reporting.</p></div><form class=\"row g-3\" id=\"ghg-calculator-form\"><div class=\"col-md-6\"><div class=\"ghg-input-card\"><p><label class=\"form-label\" for=\"ghg-electricity\">Monthly electricity usage</label></p><div class=\"input-group\"><input class=\"form-control\" id=\"ghg-electricity\" type=\"number\" min=\"0\" step=\"1\" value=\"1200\"> <span class=\"input-group-text\">kWh</span></div></div></div><div class=\"col-md-6\"><div class=\"ghg-input-card\"><p><label class=\"form-label\" for=\"ghg-chiller\">Monthly chiller consumption</label></p><div class=\"input-group\"><input class=\"form-control\" id=\"ghg-chiller\" type=\"number\" min=\"0\" step=\"1\" value=\"300\"> <span class=\"input-group-text\">kWh</span></div></div></div><div class=\"col-md-6\"><div class=\"ghg-input-card\"><p><label class=\"form-label\" for=\"ghg-water\">Monthly water consumption</label></p><div class=\"input-group\"><input class=\"form-control\" id=\"ghg-water\" type=\"number\" min=\"0\" step=\"0.1\" value=\"25\"> <span class=\"input-group-text\">m³</span></div></div></div><div class=\"col-md-6\"><div class=\"ghg-input-card\"><label class=\"form-label\" for=\"ghg-people\">People / team members</label> <input class=\"form-control\" id=\"ghg-people\" type=\"number\" min=\"1\" step=\"1\" value=\"4\"></div></div><div class=\"col-md-6\"><div class=\"ghg-input-card\"><label class=\"form-label\" for=\"ghg-gas-type\">Cooking gas type</label> <select class=\"form-select\" id=\"ghg-gas-type\">\r\n                                                                                                                                                                                                          <option value=\"cylinders\">Cylinders per month</option>\r\n                                                                                                                                                                                                          <option value=\"m3\">Central gas mÂ³ per month</option>\r\n                                                                                                                                                                                                        </select></div></div><div class=\"col-md-6\"><div class=\"ghg-input-card\"><label class=\"form-label\" for=\"ghg-gas\">Cooking gas usage</label> <input class=\"form-control\" id=\"ghg-gas\" type=\"number\" min=\"0\" step=\"0.1\" value=\"1\"></div></div><div class=\"col-12\"><div class=\"ghg-input-card\"><p><label class=\"form-label d-flex justify-content-between\" for=\"ghg-km\"><span>Weekly kilometers driven</span> <span class=\"text-muted\" data-ghg-output=\"kmValue\">180</span><span class=\"text-muted\"> km/week</span> </label><input class=\"form-range\" id=\"ghg-km\" type=\"range\" min=\"0\" max=\"1200\" step=\"10\" value=\"180\"></p><div class=\"d-flex justify-content-between small text-muted\"><span>0 km</span> <span>1,200 km</span></div></div></div><div class=\"col-md-6\"><div class=\"ghg-input-card\"><label class=\"form-label\" for=\"ghg-vehicle\">Vehicle type</label> <select class=\"form-select\" id=\"ghg-vehicle\">\r\n                                                                                                                                                                                                          <option value=\"small\">Small car</option>\r\n                                                                                                                                                                                                          <option value=\"medium\" selected=\"\">Medium car</option>\r\n                                                                                                                                                                                                          <option value=\"suv\">Large car / SUV</option>\r\n                                                                                                                                                                                                          <option value=\"ev\">Electric vehicle</option>\r\n                                                                                                                                                                                                        </select></div></div><div class=\"col-md-6\"><div class=\"ghg-input-card\"><label class=\"form-label\" for=\"ghg-diet\">Dietary habits</label> <select class=\"form-select\" id=\"ghg-diet\">\r\n                                                                                                                                                                                                          <option value=\"low\">Mostly vegetarian / low meat</option>\r\n                                                                                                                                                                                                          <option value=\"medium\" selected=\"\">Meat 2-3 times per week</option>\r\n                                                                                                                                                                                                          <option value=\"high\">Meat 4-5 times per week</option>\r\n                                                                                                                                                                                                          <option value=\"daily\">Meat daily</option>\r\n                                                                                                                                                                                                        </select></div></div><div class=\"col-md-4\"><div class=\"ghg-input-card\"><p><label class=\"form-label\" for=\"ghg-short-flights\">Short-haul return flights</label> <input class=\"form-control\" id=\"ghg-short-flights\" type=\"number\" min=\"0\" step=\"1\" value=\"2\"></p><div class=\"form-text\">&lt; 2 hours / year</div></div></div><div class=\"col-md-4\"><div class=\"ghg-input-card\"><p><label class=\"form-label\" for=\"ghg-medium-flights\">Medium-haul return flights</label> <input class=\"form-control\" id=\"ghg-medium-flights\" type=\"number\" min=\"0\" step=\"1\" value=\"1\"></p><div class=\"form-text\">2-4 hours / year</div></div></div><div class=\"col-md-4\"><div class=\"ghg-input-card\"><p><label class=\"form-label\" for=\"ghg-long-flights\">Long-haul return flights</label> <input class=\"form-control\" id=\"ghg-long-flights\" type=\"number\" min=\"0\" step=\"1\" value=\"1\"></p><div class=\"form-text\">&gt; 4 hours / year</div></div></div><div class=\"col-12\"><div class=\"ghg-input-card\"><p><label class=\"form-label d-flex justify-content-between\" for=\"ghg-spend\"><span>Monthly spending</span> <span class=\"text-muted\">AED </span><span class=\"text-muted\" data-ghg-output=\"spendValue\">6,000</span> </label><input class=\"form-range\" id=\"ghg-spend\" type=\"range\" min=\"0\" max=\"50000\" step=\"500\" value=\"6000\"></p><div class=\"d-flex justify-content-between small text-muted\"><span>AED 0</span> <span>AED 50k</span></div></div></div><div class=\"col-12\"><p><button class=\"btn ghg-btn w-100 py-3\" type=\"button\" data-ghg-action=\"calculate\">\r\n                                                                                                                                                                                                        Calculate Carbon Footprint\r\n                                                                                                                                                                                                      </button></p><p class=\"small text-muted mt-3 mb-0\">This calculator is for awareness and lead generation only. Formal GHG reporting should use verified factors, boundaries, evidence, and review workflows.</p></div></form></div></div><div class=\"col-lg-4 ghg-result-panel\"><div class=\"p-4 p-lg-5 h-100\"><div class=\"ghg-eyebrow mb-3\" style=\"background-color:rgba(255,255,255,.12);border-color:rgba(255,255,255,.18);color:#fff;\">Your estimated footprint</div><div class=\"ghg-result-number\"><span data-ghg-output=\"total\">0.00</span></div><div class=\"fw-semibold opacity-75 mb-3\">tonnes CO2e per year</div><div class=\"badge rounded-pill text-bg-light px-3 py-2 mb-4\" data-ghg-output=\"grade\">Calculating...</div><div class=\"d-grid gap-3 mb-4\"><div class=\"ghg-breakdown-row\"><p><span>Energy</span></p><div class=\"progress\"><div class=\"progress-bar\" data-ghg-bar=\"energy\">&nbsp;</div></div><p><span data-ghg-output=\"energy\"><strong>0.0</strong></span></p></div><div class=\"ghg-breakdown-row\"><p><span>Transport</span></p><div class=\"progress\"><div class=\"progress-bar\" data-ghg-bar=\"transport\">&nbsp;</div></div><p><span data-ghg-output=\"transport\"><strong>0.0</strong></span></p></div><div class=\"ghg-breakdown-row\"><p><span>Flights</span></p><div class=\"progress\"><div class=\"progress-bar\" data-ghg-bar=\"flights\">&nbsp;</div></div><p><span data-ghg-output=\"flights\"><strong>0.0</strong></span></p></div><div class=\"ghg-breakdown-row\"><p><span>Lifestyle</span></p><div class=\"progress\"><div class=\"progress-bar\" data-ghg-bar=\"lifestyle\">&nbsp;</div></div><p><span data-ghg-output=\"lifestyle\"><strong>0.0</strong></span></p></div></div><div class=\"ghg-lead-box p-3 p-md-4\"><h3 class=\"h5 fw-bold mb-2\">Need audit-ready GHG reporting?</h3><p class=\"small opacity-75 mb-3\">Automate data collection, emission factors, Scope 1-3 calculations, dashboards, approvals, and reports.</p><form data-ghg-lead-form=\"\"><div class=\"mb-2\"><input class=\"form-control\" name=\"name\" placeholder=\"Your name\"></div><div class=\"mb-3\"><input class=\"form-control\" name=\"email\" type=\"email\" placeholder=\"Work email\"></div><p><button class=\"btn ghg-btn w-100\" type=\"submit\">Get a Free Demo</button></p><div class=\"small mt-2\" style=\"color:#b9ffd0;\" data-ghg-output=\"leadMessage\">&nbsp;</div></form></div></div></div></div></div><div class=\"row g-3 mt-4\"><div class=\"col-md-4\"><div class=\"ghg-feature card\"><div class=\"card-body p-4\"><div class=\"ghg-feature-icon mb-3\">*</div><h3 class=\"h5 fw-bold ghg-title\">Automated calculations</h3><p class=\"text-muted mb-0\">Replace spreadsheets with consistent formulas, factor libraries, and repeatable workflows.</p></div></div></div><div class=\"col-md-4\"><div class=\"ghg-feature card\"><div class=\"card-body p-4\"><div class=\"ghg-feature-icon mb-3\">*</div><h3 class=\"h5 fw-bold ghg-title\">Dashboards &amp; insights</h3><p class=\"text-muted mb-0\">Monitor emissions by source, site, Scope category, business unit, and reporting year.</p></div></div></div><div class=\"col-md-4\"><div class=\"ghg-feature card\"><div class=\"card-body p-4\"><div class=\"ghg-feature-icon mb-3\">*</div><h3 class=\"h5 fw-bold ghg-title\">Audit-ready reports</h3><p class=\"text-muted mb-0\">Prepare management, customer, regulatory, and sustainability reports faster.</p></div></div></div></div></div></section><!-- Bootstrap JS is optional for this calculator. Keep it only if your site needs Bootstrap components. --><script src=\"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js\"></script><script>\r\n    (() => {\r\n      const root = document.querySelector(\".uae-ghg-calculator\");\r\n      if (!root) return;\r\n      const FACTORS = {\r\n        electricityKgPerKwh: 0.404,\r\n        chillerKgPerKwh: 0.404,\r\n        waterKgPerM3: 1.2,\r\n        gasCylinderKgPerMonth: 42.0,\r\n        centralGasKgPerM3: 2.05,\r\n        petrolKgPerLiter: 2.31,\r\n        evKgPerKm: 0.085,\r\n        mileageKmPerLiter: {\r\n          small: 16,\r\n          medium: 11,\r\n          suv: 6\r\n        },\r\n        returnFlightsTonnes: {\r\n          short: 0.35,\r\n          medium: 0.9,\r\n          long: 2.2\r\n        },\r\n        dietTonnesPerYear: {\r\n          low: 1.1,\r\n          medium: 1.7,\r\n          high: 2.4,\r\n          daily: 3.2\r\n        },\r\n        spendKgPerAed: 0.035\r\n      };\r\n      const get = id => root.querySelector(\"#\" + id);\r\n      const out = key => root.querySelectorAll(`[data-ghg-output=\"${key}\"]`);\r\n      const bar = key => root.querySelector(`[data-ghg-bar=\"${key}\"]`);\r\n      const number = id => Math.max(0, parseFloat(get(id)?.value || 0));\r\n      function setOutput(key, value) {\r\n        out(key).forEach(el => el.textContent = value);\r\n      }\r\n      function calculate() {\r\n        const electricity = number(\"ghg-electricity\") * 12 * FACTORS.electricityKgPerKwh / 1000;\r\n        const chiller = number(\"ghg-chiller\") * 12 * FACTORS.chillerKgPerKwh / 1000;\r\n        const water = number(\"ghg-water\") * 12 * FACTORS.waterKgPerM3 / 1000;\r\n        const gas = get(\"ghg-gas-type\").value === \"cylinders\"\r\n          ? number(\"ghg-gas\") * 12 * FACTORS.gasCylinderKgPerMonth / 1000\r\n          : number(\"ghg-gas\") * 12 * FACTORS.centralGasKgPerM3 / 1000;\r\n        const kmPerYear = number(\"ghg-km\") * 52;\r\n        const vehicle = get(\"ghg-vehicle\").value;\r\n        let transport = 0;\r\n        if (vehicle === \"ev\") {\r\n          transport = kmPerYear * FACTORS.evKgPerKm / 1000;\r\n        } else {\r\n          const liters = kmPerYear / FACTORS.mileageKmPerLiter[vehicle];\r\n          transport = liters * FACTORS.petrolKgPerLiter / 1000;\r\n        }\r\n        const flights =\r\n          number(\"ghg-short-flights\") * FACTORS.returnFlightsTonnes.short +\r\n          number(\"ghg-medium-flights\") * FACTORS.returnFlightsTonnes.medium +\r\n          number(\"ghg-long-flights\") * FACTORS.returnFlightsTonnes.long;\r\n        const lifestyle =\r\n          FACTORS.dietTonnesPerYear[get(\"ghg-diet\").value] +\r\n          number(\"ghg-spend\") * 12 * FACTORS.spendKgPerAed / 1000;\r\n        const energy = electricity + chiller + water + gas;\r\n        const total = energy + transport + flights + lifestyle;\r\n        const max = Math.max(energy, transport, flights, lifestyle, 0.01);\r\n        setOutput(\"total\", total.toFixed(2));\r\n        setOutput(\"heroTotal\", total.toFixed(2));\r\n        setOutput(\"energy\", energy.toFixed(1));\r\n        setOutput(\"transport\", transport.toFixed(1));\r\n        setOutput(\"flights\", flights.toFixed(1));\r\n        setOutput(\"lifestyle\", lifestyle.toFixed(1));\r\n        setOutput(\"kmValue\", Number(get(\"ghg-km\").value).toLocaleString());\r\n        setOutput(\"spendValue\", Number(get(\"ghg-spend\").value).toLocaleString());\r\n        bar(\"energy\").style.width = Math.round((energy / max) * 100) + \"%\";\r\n        bar(\"transport\").style.width = Math.round((transport / max) * 100) + \"%\";\r\n        bar(\"flights\").style.width = Math.round((flights / max) * 100) + \"%\";\r\n        bar(\"lifestyle\").style.width = Math.round((lifestyle / max) * 100) + \"%\";\r\n        let grade = \"ð± Efficient footprint\";\r\n        if (total > 12) {\r\n          grade = \"â\_ï¸ High footprint â software can help prioritize reductions\";\r\n        } else if (total > 6) {\r\n          grade = \"ð Moderate footprint â good opportunity to track and reduce\";\r\n        }\r\n        setOutput(\"grade\", grade);\r\n      }\r\n      root.querySelectorAll(\"input, select\").forEach(input => {\r\n        input.addEventListener(\"input\", calculate);\r\n        input.addEventListener(\"change\", calculate);\r\n      });\r\n      root.querySelector('[data-ghg-action=\"calculate\"]')?.addEventListener(\"click\", calculate);\r\n      root.querySelector(\"[data-ghg-lead-form]\")?.addEventListener(\"submit\", event => {\r\n        event.preventDefault();\r\n        const form = event.currentTarget;\r\n        const email = form.querySelector('input[name=\"email\"]').value.trim();\r\n        setOutput(\r\n          \"leadMessage\",\r\n          email\r\n            ? \"Thanks â connect this form to your CRM or email tool.\"\r\n            : \"Please enter a work email.\"\r\n        );\r\n      });\r\n      calculate();\r\n    })();\r\n  </script>"
