      value: '<p class="lead">High-Precision Turning Solutions for Modern Manufacturing</p><!-- Main Content --><main class="container my-5"><section><img class="img-fluid rounded" src="/u1/used-cnc-machines.jpg" alt="CNC machine price in UAE" width="50%" height="50%"><h2>About the CNC Lathe Machine</h2><p>The CNC Lathe Machine is engineered for optimal precision and durability in turning applications. Whether you''re producing complex components or simple shafts, this machine ensures reliability and accuracy.</p></section><section><h2>Key Features</h2><ul><li>High-speed spindle with automatic tool changer</li><li>Closed-loop servo system for precise control</li><li>Rigid cast iron structure to reduce vibrations</li></ul></section><section><h2>Technical Specifications</h2><div class="row"><div class="col-md-6"><h3>Performance</h3><ul><li>Max Turning Diameter: 300mm</li><li>Spindle Speed: Up to 5000 RPM</li><li>Tool Turret: 8-12 stations</li></ul></div><div class="col-md-6"><h3>Dimensions</h3><ul><li>Length: 1800mm</li><li>Width: 1200mm</li><li>Height: 1600mm</li></ul></div></div></section><section><h2>Applications</h2><p>This CNC lathe is ideal for industries such as automotive, aerospace, defense, and general metalworking.</p></section><section><h2>Product Gallery</h2><div class="row"><div class="col-md-4 mb-3"><img class="img-fluid rounded" src="/u1/used-cnc-machines.jpg" alt="CNC machine price in UAE" width="50%" height="50%"></div><div class="col-md-4 mb-3"><img class="img-fluid rounded" src="/u1/used-cnc-machines.jpg" alt="CNC machine price in UAE" width="50%" height="50%"></div><div class="col-md-4 mb-3"><img class="img-fluid rounded" src="/u1/used-cnc-machines.jpg" alt="CNC machine price in UAE" width="50%" height="50%"></div></div></section><section><h2>Why Choose Our CNC Machines?</h2><p>We provide robust support, warranty, training, and upgrade options tailored to your operational needs.</p></section></main><!-- Footer --><footer class="bg-light text-center py-4"><div class="container"><p class="mb-0">© 2025 CNC Solutions. All rights reserved.</p></div></footer>'
