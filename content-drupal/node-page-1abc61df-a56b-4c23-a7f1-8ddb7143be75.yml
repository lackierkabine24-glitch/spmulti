tter visual hierarchy</h3><p class=\"text-muted mb-0\">Cards, spacing and section grouping make the page look more trustworthy and easier to scan.</p></div></div></div><div class=\"col-md-6\"><div class=\"card h-100 shadow-sm\"><div class=\"card-body p-4\"><h3 class=\"h5 fw-bold\">Stronger conversion path</h3><p class=\"text-muted mb-0\">The strongest CTA is not \"learn more\" but a faster route to price, stock status and advice.</p></div></div></div></div></div></div></div></section><section class=\"py-5 bg-light\" id=\"used-stock\"><div class=\"container\"><div class=\"text-center mb-5\"><h2 class=\"fw-bold mb-3\">Used Machines &amp; Featured Stock</h2><p class=\"text-muted mx-auto\" style=\"max-width:860px;\">The uploaded source included a refurbished used-machines section, weekly stock updates, Dubai or Sharjah storage and featured machinery cards.</p></div><div class=\"row g-4 mb-4\"><div class=\"col-lg-6\"><div class=\"card shadow-sm h-100\"><div class=\"card-body p-4\"><p><span class=\"badge text-bg-secondary mb-3\">Used Machines Refurbished</span></p><h3 class=\"h4 fw-bold\">Weekly-updated stock for faster buying decisions</h3><p class=\"text-muted\">Best for companies that care about availability, budget control and a quicker path to inspection or purchase.</p><ul class=\"mb-4\"><li>List updates weekly</li><li>Dubai or Sharjah storage</li><li>Useful for urgent buying needs</li></ul><p><a class=\"btn btn-primary rounded-pill px-4\" href=\"/used-machines\">Browse used machines</a></p></div></div></div><div class=\"col-lg-6\"><div class=\"card text-bg-dark border-0 shadow-sm h-100\"><div class=\"card-body p-4\"><p><span class=\"badge text-bg-warning text-dark mb-3\">Best CTA for buyers</span></p><h3 class=\"h4 fw-bold\">Ask for price, condition and availability in one message</h3><p class=\"text-white-50\">For used-machine buyers, WhatsApp is often a stronger action than a long contact process.</p><p><a class=\"btn btn-success rounded-pill px-4\" href=\"https: